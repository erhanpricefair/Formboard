<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Form Board</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080c10;font-family:'Courier New',monospace;color:#dde6ef;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const C={bg:"#080c10",panel:"#0f1620",border:"#1a2535",accent:"#00c896",accentDim:"#004d3a",gold:"#f5c842",red:"#ff4d4d",text:"#dde6ef",muted:"#5a6f80",alt:"#0b1219",blue:"#4da6ff",purple:"#b07aff",orange:"#ff8c42"};

const BW={rating:0.08,form:0.13,weight:0.04,barrier:0.04,trainerTier:0.08,jockeyTier:0.05,oddsSignal:0.08,trackAffinity:0.12,goingPref:0.09,distancePref:0.10,sectionalScore:0.05,prepCycle:0.07,classDrop:0.07};
const BW_SUM=Object.values(BW).reduce((a,b)=>a+b,0);

// Going adjustment table — seconds per 600m vs Good 4 baseline
const GOING_ADJ={
  "firm":-0.8,"good3":-0.4,"good4":0,"good":0,
  "soft5":0.8,"soft6":1.4,"soft7":2.0,"soft":0.8,
  "heavy8":2.8,"heavy9":3.6,"heavy10":4.5,"heavy":2.8
};

function getGoingKey(goingStr){
  if(!goingStr) return "good4";
  const s=goingStr.toLowerCase().replace(/[^a-z0-9]/g,"");
  if(s.includes("heavy10")) return "heavy10";
  if(s.includes("heavy9")) return "heavy9";
  if(s.includes("heavy8")) return "heavy8";
  if(s.includes("heavy")) return "heavy";
  if(s.includes("soft7")) return "soft7";
  if(s.includes("soft6")) return "soft6";
  if(s.includes("soft5")) return "soft5";
  if(s.includes("soft")) return "soft";
  if(s.includes("good3")) return "good3";
  if(s.includes("good4")) return "good4";
  if(s.includes("good")) return "good4";
  if(s.includes("firm")) return "firm";
  return "good4";
}

function getGoingAdj(goingStr){
  const key=getGoingKey(goingStr);
  return GOING_ADJ[key]??0;
}

// Weight adjustment — 0.2s per kg per 600m at 1600m
// Scale by distance: shorter races weight matters less
function getWeightAdj(weightThen, weightNow, distanceRace){
  if(!weightThen||!weightNow) return 0;
  const diff=weightNow-weightThen; // positive = heavier today = slower
  const distFactor=Math.min(distanceRace/1600, 1.2); // cap at 1.2 for long races
  return diff * 0.2 * distFactor;
}

// Normalise sectional to Good 4 equivalent at current weight
function normaliseSectional(sect, raceGoing, raceWeight, raceDistance){
  if(!sect||!sect.time||sect.time<=0) return null;
  const goingThen=getGoingAdj(sect.going);
  const goingNow=getGoingAdj(raceGoing);
  const goingDiff=goingThen-goingNow; // positive = ran on slower going = subtract to normalise
  const weightAdj=getWeightAdj(sect.weight||raceWeight, raceWeight, raceDistance||1600);
  // normalised = raw time - going slowness + weight penalty today vs then
  return sect.time - goingDiff - weightAdj;
}

function scoreSectionals(sectionals, raceGoing, raceWeight, raceDistance){
  if(!sectionals||sectionals.length===0) return 0.5;
  const valid=sectionals.filter(s=>s&&s.time&&s.time>0);
  if(valid.length===0) return 0.5;

  const normed=valid.map(s=>normaliseSectional(s, raceGoing, raceWeight, raceDistance)).filter(v=>v!==null);
  if(normed.length===0) return 0.5;

  const best=Math.min(...normed);

  // Trend: most recent vs oldest (negative = improving)
  let trendBonus=0;
  if(normed.length>=2){
    const trend=normed[0]-normed[normed.length-1];
    trendBonus=Math.max(-0.15, Math.min(0.15, -trend*0.08));
  }

  // Score normalised best time (Good 4 equivalent last 600m at race weight)
  // Elite 1100m: ~33.0, Elite 1600m: ~34.5, Poor: ~37+
  const timeScore=best<=33.0?1.0:best<=33.5?0.95:best<=34.0?0.88:best<=34.5?0.80:best<=35.0?0.70:best<=35.5?0.58:best<=36.0?0.45:best<=36.8?0.32:0.20;

  const conf=Math.min(valid.length/3,1);
  const raw=Math.min(1,Math.max(0,timeScore+trendBonus));
  return raw*conf+0.5*(1-conf);
}

function detectGoing(g){if(!g)return"good";const s=g.toLowerCase();if(s.includes("heavy"))return"heavy";if(s.includes("soft"))return"soft";if(s.includes("good"))return"good";return"good";}
function goingWeights(rg){if(rg==="soft")return{good:0.1,soft:1.0,heavy:0.2};if(rg==="heavy")return{good:0.0,soft:0.4,heavy:1.0};return{good:1.0,soft:0.2,heavy:0.0};}
function scoreGoing(ex,rg){
  const gw=goingWeights(rg);
  const gs=scoreWPR(parseInt(ex.good_wins)||0,parseInt(ex.good_places)||0,parseInt(ex.good_runs)||0);
  const ss=scoreWPR(parseInt(ex.soft_wins)||0,parseInt(ex.soft_places)||0,parseInt(ex.soft_runs)||0);
  const hs=scoreWPR(parseInt(ex.heavy_wins)||0,parseInt(ex.heavy_places)||0,parseInt(ex.heavy_runs)||0);
  if(gs===null&&ss===null&&hs===null) return 0.5;
  let total=0,wsum=0;
  if(gw.good>0){total+=(gs!==null?gs:0.5)*gw.good;wsum+=gw.good;}
  if(gw.soft>0){total+=(ss!==null?ss:0.5)*gw.soft;wsum+=gw.soft;}
  if(gw.heavy>0){total+=(hs!==null?hs:0.5)*gw.heavy;wsum+=gw.heavy;}
  return wsum>0?total/wsum:0.5;
}
function scoreForm(f){if(!f)return 0;const chars=f.replace(/x/gi,"").split("").reverse();if(!chars.length)return 0;const map={"1":10,"2":8,"3":6,"4":4,"5":3,"6":2,"7":1,"8":1,"9":0,"0":0};let s=0,w=1;for(const c of chars){s+=(map[c]??0)*w;w*=0.75;}return Math.min(s/12,1);}
function scoreOdds(w){if(!w||isNaN(w)||w<=0)return 0.3;if(w<=2.5)return 1.0;if(w<=4)return 0.90;if(w<=6)return 0.80;if(w<=10)return 0.65;if(w<=15)return 0.48;if(w<=25)return 0.32;return 0.15;}
function scoreWPR(wins,places,runs){if(!runs||runs===0)return null;const rate=(wins+places*0.6)/runs;const conf=Math.min(runs/5,1);const base=rate>=0.5?1.0:rate>=0.35?0.85:rate>=0.25?0.72:rate>=0.15?0.58:rate>=0.08?0.42:0.28;return base*conf+0.5*(1-conf);}
function scoreWPRN(w,p,r){const s=scoreWPR(w,p,r);return s===null?0.5:s;}

// CLASS DROP/RISE — fs_rating: negative=dropping(good), positive=rising(risk)
function scoreClass(fs){if(fs===null||fs===undefined||isNaN(parseFloat(fs)))return 0.5;const f=parseFloat(fs);if(f<=-8)return 1.00;if(f<=-5)return 0.92;if(f<=-3)return 0.82;if(f<=-1)return 0.72;if(f<=1)return 0.60;if(f<=3)return 0.48;if(f<=5)return 0.36;if(f<=7)return 0.24;return 0.15;}

// DAYS SINCE LAST RUN — optimal 7-21 days, penalty for resumers
function parseRecord(s){if(!s)return null;const m=s.match(/(\d+):(\d+)-(\d+)/);if(!m)return null;return{runs:+m[1],wins:+m[2],places:+m[3]};}
function scoreFreshness(days,firstUp){if(!days||days===0)return 0.55;if(days<=7)return 0.70;if(days<=14)return 0.92;if(days<=21)return 1.00;if(days<=35)return 0.85;if(days<=60)return 0.70;const rec=parseRecord(firstUp);if(rec&&rec.runs>0){const rate=(rec.wins+rec.places*0.5)/rec.runs;return Math.max(0.30,Math.min(0.72,rate));}return 0.38;}

// PREP CYCLE — score current run-in-prep based on positional record
function scorePrepCycle(r,days){const d=parseInt(days)||0;const rip=r.run_in_prep||(d===0?1:d>60?1:d>21?2:3);const rec=rip===1?parseRecord(r.first_up):rip===2?parseRecord(r.second_up):parseRecord(r.third_up);if(!rec)return 0.5;return scoreWPRN(rec.wins,rec.places,rec.runs);}

// TAB COMMENT SENTIMENT
function scoreTabComment(c){if(!c)return 0.5;const s=c.toLowerCase();let score=0.5;const sp=["hard to beat","take plenty of beating","will take catching","expected to take catching","go one better","well fancied","take catching again","dominant","certain","ideal","fancied"];const mp=["racing well","going well","sets up nicely","shapes up nicely","deserves chance","positive return","each-way","improvement anticipated","well placed","thereabouts","chance"];const mn=["prefer to see","needs to step","another step","needs improvement","place best"];const sn=["will struggle","struggle against","hard to see","well beaten","significant improvement","out of form"];sp.forEach(w=>{if(s.includes(w))score+=0.14;});mp.forEach(w=>{if(s.includes(w))score+=0.06;});mn.forEach(w=>{if(s.includes(w))score-=0.06;});sn.forEach(w=>{if(s.includes(w))score-=0.14;});return Math.max(0.10,Math.min(0.95,score));}

// BARRIER — track-aware
function scoreBarrier(b,n,track){const t=(track||"").toLowerCase();if(t.includes("warwick")){if(b<=2)return 1.0;if(b<=4)return 0.88;if(b<=6)return 0.72;if(b<=8)return 0.55;return 0.35;}if(t.includes("randwick")||t.includes("rosehill")){if(b<=3)return 0.88;if(b<=6)return 0.82;if(b<=10)return 0.70;return 0.55;}return Math.max(0,1-Math.abs(b-n*0.4)/(n*0.5));}

// JOCKEY — apprentice claims scored as advantage not penalty
function scoreJockey(j){const s=(j||"").toLowerCase();if(s.includes("schiller")||s.includes("rawiller")||s.includes("schofield")||s.includes("latham"))return 0.92;if(s.includes("clark")||s.includes("mcdonald")||s.includes("oliver"))return 0.90;if(s.includes("stanley")||s.includes("gibbons")||s.includes("sherry")||s.includes("berry")||s.includes("collett"))return 0.80;if(s.includes("bates")||s.includes("coffey")||s.includes("nock"))return 0.75;if(s.includes("grima")||s.includes("roper")||s.includes("ford")||s.includes("puls"))return 0.68;if(s.includes("a(1.5)"))return 0.72;if(s.includes("a(2)"))return 0.70;if(s.includes("a(3)"))return 0.67;return 0.55;}

function scoreTrainer(t){const s=(t||"").toLowerCase();if(s.includes("waller"))return 1.0;if(s.includes("archibald")||s.includes("annabel"))return 0.85;if(s.includes("snowden"))return 0.82;if(s.includes("lees"))return 0.78;if(s.includes("conners")||s.includes("price"))return 0.72;if(s.includes("crockett"))return 0.68;if(s.includes("baker"))return 0.65;if(s.includes("pride")||s.includes("ryan"))return 0.65;if(s.includes("pepper"))return 0.58;if(s.includes("wilkes")||s.includes("noblet"))return 0.55;return 0.48;}
function hasData(ex){return ex&&Object.values(ex).some(v=>parseInt(v)>0);}

function analyze(runners,extraData,raceGoing,raceTrack){
  const rg=detectGoing(raceGoing);
  const maxR=Math.max(...runners.map(r=>r.rating||0));
  const wts=runners.map(r=>r.weight||0).filter(w=>w>0);
  const minW=wts.length?Math.min(...wts):50;
  const maxW=wts.length?Math.max(...wts):60;
  const n=runners.length;

  // Stable dilution: count runners per trainer
  const stableCounts={};
  runners.forEach(r=>{const t=(r.trainer||"").toLowerCase();stableCounts[t]=(stableCounts[t]||0)+1;});

  const scored=runners.map(r=>{
    const ex=extraData?.[r.name]||{};
    const merged={
      track_wins:parseInt(ex.track_wins)||r.track_wins||0,
      track_places:parseInt(ex.track_places)||r.track_places||0,
      track_runs:parseInt(ex.track_runs)||r.track_runs||0,
      good_wins:parseInt(ex.good_wins)||r.good_wins||0,
      good_places:parseInt(ex.good_places)||r.good_places||0,
      good_runs:parseInt(ex.good_runs)||r.good_runs||0,
      soft_wins:parseInt(ex.soft_wins)||r.soft_wins||0,
      soft_places:parseInt(ex.soft_places)||r.soft_places||0,
      soft_runs:parseInt(ex.soft_runs)||r.soft_runs||0,
      heavy_wins:parseInt(ex.heavy_wins)||r.heavy_wins||0,
      heavy_places:parseInt(ex.heavy_places)||r.heavy_places||0,
      heavy_runs:parseInt(ex.heavy_runs)||r.heavy_runs||0,
      dist_wins:parseInt(ex.dist_wins)||r.dist_wins||0,
      dist_places:parseInt(ex.dist_places)||r.dist_places||0,
      dist_runs:parseInt(ex.dist_runs)||r.dist_runs||0,
    };
    const sectionals=r.sectionals||[];
    const sectScore=scoreSectionals(sectionals,raceGoing,r.weight,r.distance||1600);
    const lastRunDays=parseInt(r.last_run_days)||0;

    // Weight signal: null = neutral, capped at 0.80
    const weightKnown=r.weight&&r.weight>0;
    const rawWeightScore=(!weightKnown||maxW===minW)?0.5:1-(r.weight-minW)/(maxW-minW);
    const weightScore=!weightKnown?0.5:Math.min(rawWeightScore,0.80);

    // Track+Dist specialist
    const trkDistWins=parseInt(r.trk_dist_wins)||0;
    const trkDistPlaces=parseInt(r.trk_dist_places)||0;
    const trkDistRuns=parseInt(r.trk_dist_runs)||0;
    const trkDistScore=scoreWPRN(trkDistWins,trkDistPlaces,trkDistRuns);
    const trackAffinityRaw=scoreWPRN(merged.track_wins,merged.track_places,merged.track_runs);
    const trackAffinityScore=trkDistRuns>0?Math.max(trackAffinityRaw,trkDistScore):trackAffinityRaw;
    const distancePrefScore=scoreWPRN(merged.dist_wins,merged.dist_places,merged.dist_runs);

    // New signals
    const classScore=scoreClass(r.fs_rating);
    const freshnessScore=scoreFreshness(lastRunDays,r.first_up);
    const prepScore=scorePrepCycle(r,lastRunDays);
    const tabScore=scoreTabComment(r.tab_comment);
    const trainerKey=(r.trainer||"").toLowerCase();
    const stableCount=stableCounts[trainerKey]||1;
    const trainerRaw=scoreTrainer(r.trainer);
    // Dilute trainer score if stable runs multiple — each extra runner = 10% dilution
    const trainerScore=stableCount>1?trainerRaw*(1-(stableCount-1)*0.10):trainerRaw;
    const jockeyScore=scoreJockey(r.jockey);
    const barrierScore=scoreBarrier(r.barrier,n,raceTrack||"");

    const scores={
      rating:maxR>0?(r.rating||0)/maxR:0.5,
      form:scoreForm(r.form),
      weight:weightScore,
      barrier:barrierScore,
      trainerTier:trainerScore,
      jockeyTier:jockeyScore,
      oddsSignal:scoreOdds(r.win_odds),
      trackAffinity:trackAffinityScore,
      goingPref:scoreGoing(merged,rg),
      distancePref:distancePrefScore,
      sectionalScore:sectScore,
      prepCycle:prepScore,
      classDrop:classScore,
    };

    // TAB sentiment applied as a modifier on top of weighted score (not a full signal to avoid double-counting)
    const tabModifier=(tabScore-0.5)*0.025; // max ±2.5% effect

    // Convergence: requires win evidence + minimum runs on each signal
    const trackStrong=trackAffinityScore>=0.72&&merged.track_wins>=1&&(merged.track_runs>=2||trkDistRuns>=2);
    const distStrong=distancePrefScore>=0.72&&merged.dist_wins>=1&&merged.dist_runs>=3;
    const goingScore2=scoreGoing(merged,rg);
    const goingWins=rg==="good"?(merged.good_wins||0):rg==="soft"?(merged.soft_wins||0):(merged.heavy_wins||0);
    const goingRuns=rg==="good"?(merged.good_runs||0):rg==="soft"?(merged.soft_runs||0):(merged.heavy_runs||0);
    const goingStrong=goingScore2>=0.72&&goingWins>=1&&goingRuns>=3;
    const recentWins=(r.form||"").slice(-10).split("").filter(c=>c==="1").length;
    const formStrong=recentWins>=1&&scoreForm(r.form)>=0.70;
    const prepRec=scorePrepCycle(r,lastRunDays);
    const _prepD=lastRunDays;const _prepRip=r.run_in_prep||(_prepD>60?1:_prepD>21?2:3);const _prepRecRaw=_prepRip===1?parseRecord(r.first_up):_prepRip===2?parseRecord(r.second_up):parseRecord(r.third_up);
    const prepStrong=prepRec>=0.72&&_prepRecRaw&&_prepRecRaw.runs>=2&&_prepRecRaw.wins>=1;
    const classStrong=classScore>=0.82; // dropping 3+ FS points
    const convergenceHits=[trackStrong,distStrong,goingStrong,formStrong,prepStrong,classStrong].filter(Boolean).length;
    const convergenceBonus=convergenceHits>=4?0.055:convergenceHits===3?0.038:convergenceHits===2?0.020:0;

    // Single-signal penalty
    const isLightWeight=weightKnown&&r.weight<55;
    const singleSignalPenalty=(isLightWeight&&convergenceHits<2&&!formStrong)?0.020:0;

    // Long absence penalty (resumers without strong first-up record)
    const absencePenalty=lastRunDays>100&&freshnessScore<0.50?0.015:0;

    const total=Object.entries(BW).reduce((s,[k,w])=>s+scores[k]*(w/BW_SUM),0)+convergenceBonus+tabModifier-singleSignalPenalty-absencePenalty;
    return{...r,scores,total,_ex:merged,_sectionals:sectionals,_sectScore:sectScore,_convergenceHits:convergenceHits,_convergenceBonus:convergenceBonus,_singleSignalPenalty:singleSignalPenalty,_absencePenalty:absencePenalty,_tabScore:tabScore,_freshnessScore:freshnessScore,_classScore:classScore};
  });
  const sum=scored.reduce((s,r)=>s+r.total,0);
  return scored.map(r=>({...r,prob:r.total/sum})).sort((a,b)=>b.prob-a.prob);
}

function edgeTag(prob,odds){
  if(!odds||isNaN(odds)||odds<=0)return null;
  const e=prob-1/odds;
  if(e>0.06)return{label:"VALUE",color:"#00e87a"};
  if(e>0.02)return{label:"SLIGHT",color:"#f5c842"};
  if(e<-0.08)return{label:"AVOID",color:"#ff4d4d"};
  return{label:"FAIR",color:"#6b7f8f"};
}

const SCORE_LABELS={rating:"RATING",form:"FORM",weight:"WEIGHT",barrier:"BARRIER",trainerTier:"TRAINER",jockeyTier:"JOCKEY",oddsSignal:"ODDS",trackAffinity:"TRACK",goingPref:"GOING",distancePref:"DISTANCE",sectionalScore:"SECTIONALS",prepCycle:"PREP CYCLE",classDrop:"CLASS DROP"};

function App(){
  const [results,setResults]=useState(null);
  const [tab,setTab]=useState("load");
  const [json,setJson]=useState("");
  const [err,setErr]=useState("");
  const [cRace,setCRace]=useState(null);
  const [cRunners,setCRunners]=useState(null);

  const aRace=cRace||{track:"—",race_number:"—",distance:"—",class:"—",going:"—"};
  const rg=detectGoing(aRace.going||"");
  const gw=goingWeights(rg);

  function runCustom(){
    setErr("");
    try{
      const parsed=JSON.parse(json);
      const data=parsed.runners?parsed:{runners:parsed};
      if(!Array.isArray(data.runners))throw new Error("No runners array");
      setCRunners(data.runners);
      setCRace(data.race||null);
      setResults(analyze(data.runners,{},data.race?.going||"",data.race?.track||""));
      setTab("results");
    }catch(e){setErr(e.message);}
  }

  const top=results?.[0];

  // Format normalised sectional for display
  function formatSect(r){
    if(!r._sectionals||r._sectionals.length===0) return null;
    return r._sectionals.map(s=>{
      const norm=normaliseSectional(s,aRace.going,r.weight,r.distance||1600);
      return `${s.time}s(${s.going?.match(/\d+/)?.[0]||"?"}/${s.weight||"?"}kg)→${norm?norm.toFixed(2):"?"}adj`;
    }).join(" · ");
  }

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'Courier New',monospace",paddingBottom:60}}>
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"14px 20px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:10,color:C.accent,letterSpacing:4,fontWeight:900}}>FORM</span>
        <span style={{fontSize:18,fontWeight:900,letterSpacing:-1}}>BOARD</span>
        <span style={{marginLeft:"auto",fontSize:9,color:C.muted}}>v13 · FULL SIGNAL ENGINE</span>
      </div>

      <div style={{maxWidth:820,margin:"0 auto",padding:"0 8px"}}>

        {aRace.track!=="—"&&(
          <div style={{margin:"12px 0 0",background:C.panel,border:`1px solid ${C.accentDim}`,borderLeft:`3px solid ${C.accent}`,padding:"8px 12px",fontSize:11,display:"flex",flexWrap:"wrap",gap:"4px 14px",alignItems:"center"}}>
            <span style={{color:C.accent,fontWeight:700}}>{aRace.track?.toUpperCase()} R{aRace.race_number}</span>
            <span style={{color:C.muted}}>{aRace.distance}m · {aRace.class}</span>
            <span style={{color:C.gold,fontWeight:700}}>{aRace.going}</span>
            {aRace.prize_money&&<span style={{color:C.muted}}>${aRace.prize_money.toLocaleString()}</span>}
            <span style={{marginLeft:"auto",fontSize:8,color:C.muted}}>
              SOFT <span style={{color:C.accent}}>{(gw.soft*100).toFixed(0)}%</span> · HEAVY <span style={{color:C.purple}}>{(gw.heavy*100).toFixed(0)}%</span>
            </span>
          </div>
        )}

        <div style={{display:"flex",marginTop:12,borderBottom:`1px solid ${C.border}`}}>
          {["load","results"].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{background:tab===t?C.panel:"transparent",color:tab===t?C.accent:C.muted,border:"none",borderBottom:tab===t?`2px solid ${C.accent}`:"2px solid transparent",padding:"7px 16px",fontFamily:"inherit",fontSize:10,letterSpacing:1.5,cursor:"pointer",textTransform:"uppercase"}}>
              {t==="load"?"LOAD RACE":"RESULTS"}
            </button>
          ))}
        </div>

        {tab==="load"&&(
          <div style={{marginTop:12}}>
            <div style={{fontSize:10,color:C.accent,letterSpacing:1.5,marginBottom:6}}>PASTE RACE JSON</div>
            <div style={{fontSize:9,color:C.muted,marginBottom:8,lineHeight:1.6}}>
              Sectionals format per runner — going, weight carried AND distance are all used for adjustment:
            </div>
            <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:"10px 12px",fontSize:9,color:C.muted,marginBottom:10,lineHeight:1.8}}>
              <span style={{color:C.orange}}>"sectionals"</span>: [<br/>
              &nbsp;&nbsp;{"{"}<span style={{color:C.accent}}>"time"</span>: 36.33, <span style={{color:C.accent}}>"going"</span>: "Soft (7)", <span style={{color:C.accent}}>"weight"</span>: 55{"}"},{" "}<span style={{color:C.muted}}>// most recent first</span><br/>
              &nbsp;&nbsp;{"{"}<span style={{color:C.accent}}>"time"</span>: 35.80, <span style={{color:C.accent}}>"going"</span>: "Soft (5)", <span style={{color:C.accent}}>"weight"</span>: 56{"}"}<br/>
              ]
            </div>
            <div style={{fontSize:9,color:C.muted,marginBottom:8,lineHeight:1.6}}>
              Model adjusts each sectional: <span style={{color:C.gold}}>going grade difference</span> (~0.4-0.8s per grade) + <span style={{color:C.orange}}>weight difference</span> (0.2s per kg at 1600m) → normalised score. Trend direction also rewarded.
            </div>
            <textarea value={json} onChange={e=>setJson(e.target.value)}
              placeholder='{"race":{"track":"Warwick Farm","race_number":4,"distance":1600,"class":"BM72","going":"Good (4)"},"runners":[{"name":"HOT BANDIT","barrier":5,"weight":null,"win_odds":14.90,"good_wins":0,"good_places":6,"good_runs":12,"soft_wins":3,"soft_places":3,"soft_runs":11,"heavy_wins":3,"heavy_places":1,"heavy_runs":5,"track_wins":0,"track_places":2,"track_runs":3,"dist_wins":1,"dist_places":1,"dist_runs":3,"trk_dist_wins":0,"trk_dist_places":0,"trk_dist_runs":0,"form":"2215x815121x8930x823","rating":70,"sectionals":[]}]}'
              style={{width:"100%",height:220,background:C.panel,border:`1px solid ${C.border}`,color:C.text,fontFamily:"inherit",fontSize:11,padding:10,resize:"vertical",outline:"none",boxSizing:"border-box",borderRadius:4}}/>
            {err&&<div style={{color:C.red,fontSize:10,marginTop:4}}>Error: {err}</div>}
            <button onClick={runCustom} style={{marginTop:10,width:"100%",background:C.accent,color:"#000",border:"none",padding:"12px",fontFamily:"inherit",fontSize:11,fontWeight:700,letterSpacing:2,cursor:"pointer",borderRadius:3}}>LOAD AND RUN</button>
          </div>
        )}

        {tab==="results"&&results&&(
          <div style={{marginTop:12}}>
            {top&&(
              <div style={{background:C.panel,border:`1px solid ${C.accent}`,borderRadius:4,padding:"12px 14px",marginBottom:14}}>
                <div style={{fontSize:9,color:C.accent,letterSpacing:3,marginBottom:4}}>TOP PICK</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                  <div>
                    <div style={{fontSize:16,fontWeight:900}}>{top.name} <span style={{fontSize:10,color:C.muted,fontWeight:400}}>(B{top.barrier})</span></div>
                    <div style={{fontSize:9,color:C.muted,marginTop:2}}>{top.trainer} · F:{top.form} · {top.weight?top.weight+"kg":"?kg"}</div>
                    {top._convergenceHits>=2&&<div style={{fontSize:8,color:C.accent,marginTop:3}}>★ {top._convergenceHits} convergence signals</div>}
                    {top._singleSignalPenalty>0&&<div style={{fontSize:8,color:C.red,marginTop:3}}>⚠ single-signal penalty applied</div>}
                    {top._sectionals?.length>0&&(
                      <div style={{fontSize:8,color:C.orange,marginTop:3,lineHeight:1.5}}>{formatSect(top)}</div>
                    )}
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:22,fontWeight:900,color:C.accent}}>{(top.prob*100).toFixed(1)}%</div>
                    <div style={{fontSize:10,color:C.muted}}>WIN ${top.win_odds}</div>
                  </div>
                </div>
                {edgeTag(top.prob,top.win_odds)&&<div style={{marginTop:8,fontSize:9,fontWeight:700,letterSpacing:2,color:edgeTag(top.prob,top.win_odds).color,borderTop:`1px solid ${C.border}`,paddingTop:8}}>{edgeTag(top.prob,top.win_odds).label} — {((top.prob-1/top.win_odds)*100).toFixed(1)}% edge</div>}
              </div>
            )}

            <div style={{fontSize:8,color:C.muted,letterSpacing:1,marginBottom:4,display:"grid",gridTemplateColumns:"20px 1fr 44px 46px 46px 52px",gap:4,padding:"0 6px"}}>
              <span></span><span>RUNNER</span><span style={{textAlign:"right"}}>PROB</span><span style={{textAlign:"right"}}>WIN</span><span style={{textAlign:"right"}}>PLC</span><span style={{textAlign:"right"}}>EDGE</span>
            </div>

            {results.map((r,i)=>{
              const tag=edgeTag(r.prob,r.win_odds);
              const hasSect=r._sectionals?.length>0;
              const normedBest=hasSect?Math.min(...r._sectionals.map(s=>normaliseSectional(s,aRace.going,r.weight,r.distance||1600)).filter(v=>v!==null)):null;
              return(
                <div key={r.name} style={{display:"grid",gridTemplateColumns:"20px 1fr 44px 46px 46px 52px",gap:4,padding:"9px 6px",background:i%2===0?C.panel:C.alt,borderBottom:`1px solid ${C.border}`,alignItems:"center",borderLeft:hasSect?`3px solid ${C.orange}`:`3px solid transparent`}}>
                  <span style={{fontSize:10,color:i===0?C.accent:C.muted,fontWeight:i===0?700:400}}>{i+1}</span>
                  <div>
                    <div style={{fontSize:11,fontWeight:i<3?700:400,color:i===0?C.text:"#b0bec5"}}>{r.name}</div>
                    <div style={{fontSize:8,color:C.muted}}>{r.trainer?.split(" ").slice(-1)[0]} · F:{r.form} · {r.weight?r.weight+"kg":"?kg"}</div>
                    {hasSect&&normedBest&&<div style={{fontSize:8,color:C.orange}}>adj {normedBest.toFixed(2)}s best</div>}
                    {r._convergenceHits>=2&&<div style={{fontSize:8,color:C.accent}}>★ {r._convergenceHits} conv signals{r._convergenceBonus>0?` +${(r._convergenceBonus*100).toFixed(1)}%`:""}</div>}
                    {r._singleSignalPenalty>0&&<div style={{fontSize:8,color:C.red}}>⚠ single-signal −{(r._singleSignalPenalty*100).toFixed(1)}%</div>}
                    {r._absencePenalty>0&&<div style={{fontSize:8,color:C.red}}>⚠ long absence −{(r._absencePenalty*100).toFixed(1)}%</div>}
                    {r._tabScore>=0.65&&<div style={{fontSize:8,color:C.gold}}>TAB ✓ confident</div>}
                    {r._tabScore<=0.35&&<div style={{fontSize:8,color:C.red}}>TAB ✗ negative</div>}
                  </div>
                  <span style={{textAlign:"right",fontSize:12,fontWeight:700,color:i===0?C.accent:C.text}}>{(r.prob*100).toFixed(1)}%</span>
                  <span style={{textAlign:"right",fontSize:11}}>{r.win_odds>0?`$${r.win_odds}`:"-"}</span>
                  <span style={{textAlign:"right",fontSize:11,color:C.muted}}>{r.place_odds?`$${r.place_odds}`:"-"}</span>
                  <span style={{textAlign:"right",fontSize:9,fontWeight:700,letterSpacing:1,color:tag?.color??C.muted}}>{tag?.label??"-"}</span>
                </div>
              );
            })}

            <div style={{marginTop:16,fontSize:9,color:C.muted,letterSpacing:1.5,marginBottom:8}}>SCORE BREAKDOWN — TOP 3</div>
            {results.slice(0,3).map((r,i)=>(
              <div key={r.name} style={{background:C.panel,border:`1px solid ${i===0?C.accentDim:C.border}`,borderRadius:4,padding:"10px 14px",marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:11,fontWeight:700,color:i===0?C.accent:C.text}}>{r.name}</span>
                  <span style={{fontSize:11,color:C.muted}}>{(r.prob*100).toFixed(1)}%</span>
                </div>
                {r._sectionals?.length>0&&(
                  <div style={{fontSize:8,color:C.orange,marginBottom:8,lineHeight:1.6}}>{formatSect(r)}</div>
                )}
                {Object.entries(r.scores).map(([k,v])=>{
                  const isSect=k==="sectionalScore";
                  const isGoing=k==="goingPref",isTrack=k==="trackAffinity",isDist=k==="distancePref";
                  const pct=Math.min(v*100,100);
                  const col=pct>70?C.accent:pct>45?C.gold:C.red;
                  const lc=isSect?C.orange:isGoing?C.accent:isTrack?C.blue:isDist?C.gold:C.muted;
                  const noData=isSect&&(!r._sectionals||r._sectionals.length===0);
                  return(
                    <div key={k} style={{marginBottom:5}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                        <span style={{fontSize:8,color:lc,letterSpacing:1}}>{SCORE_LABELS[k]||k}{noData?" (no data)":""}</span>
                        <span style={{fontSize:8,color:C.muted}}>{pct.toFixed(0)}</span>
                      </div>
                      <div style={{height:3,background:C.border,borderRadius:2}}>
                        <div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:2}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}

        <div style={{marginTop:14,padding:"8px 10px",background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,fontSize:8,display:"flex",flexWrap:"wrap",gap:"3px 14px"}}>
          <span style={{color:"#00e87a"}}>VALUE &gt;6%</span>
          <span style={{color:"#f5c842"}}>SLIGHT 2-6%</span>
          <span style={{color:"#6b7f8f"}}>FAIR</span>
          <span style={{color:"#ff4d4d"}}>AVOID</span>
          <span style={{color:C.accent}}>★ convergence</span>
          <span style={{color:C.gold}}>TAB sentiment</span>
          <span style={{color:C.orange}}>● sectionals</span>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
