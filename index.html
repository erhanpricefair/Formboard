const GOING_ADJ={"firm":-0.8,"good3":-0.4,"good4":0,"good":0,"soft5":0.8,"soft6":1.4,"soft7":2.0,"soft":0.8,"heavy8":2.8,"heavy9":3.6,"heavy10":4.5,"heavy":2.8,"synthetic":0};
function getGoingKey(g){
  if(!g)return"good4";const s=g.toLowerCase().replace(/[^a-z0-9]/g,"");
  if(s.includes("synthetic")||s.includes("awt"))return"synthetic";
  if(s.includes("heavy10"))return"heavy10";if(s.includes("heavy9"))return"heavy9";if(s.includes("heavy8"))return"heavy8";if(s.includes("heavy"))return"heavy";
  if(s.includes("soft7"))return"soft7";if(s.includes("soft6"))return"soft6";if(s.includes("soft5"))return"soft5";if(s.includes("soft"))return"soft";
  if(s.includes("good3"))return"good3";if(s.includes("good4"))return"good4";if(s.includes("good"))return"good4";
  if(s.includes("firm"))return"firm";return"good4";
}
function detectGoing(g){
  if(!g)return"good";const s=g.toLowerCase();
  if(s.includes("heavy"))return"heavy";if(s.includes("soft"))return"soft";
  if(s.includes("synthetic")||s.includes("awt"))return"synthetic";return"good";
}
function getGoingAdj(g){return GOING_ADJ[getGoingKey(g)]??0;}

function trainerTier(t){
  const s=(t||"").toLowerCase();
  if(s.includes("waller")||s.includes("mcevoy")||s.includes("maher")||s.includes("eustace"))return 1.00;
  if(s.includes("snowden")||s.includes("cunningham")||s.includes("hayes"))return 0.92;
  if(s.includes("lees")||s.includes("archibald")||s.includes("annabel")||s.includes("freedman"))return 0.88;
  if(s.includes("chalmers")||s.includes("zahra")||s.includes("archard")||s.includes("goodwin"))return 0.80;
  if(s.includes("wilde")||s.includes("dyer")||s.includes("brisbourne")||s.includes("lake"))return 0.75;
  if(s.includes("dwyer")||s.includes("o'prey")||s.includes("vella")||s.includes("weir"))return 0.72;
  if(s.includes("clarken")||s.includes("gascoyne")||s.includes("birnie")||s.includes("o'sullivan"))return 0.70;
  if(s.includes("walters")||s.includes("jolly")||s.includes("boyd")||s.includes("gollan"))return 0.65;
  if(s.includes("conners")||s.includes("price")||s.includes("baker")||s.includes("ryan"))return 0.62;
  return 0.50;
}

function jockeyTier(j){
  const s=(j||"").toLowerCase();
  if(s.includes("rawiller")||s.includes("mcdonald")||s.includes("oliver"))return 0.96;
  if(s.includes("coffey")||s.includes("shinn")||s.includes("allen")||s.includes("mccormick"))return 0.90;
  if(s.includes("king")||s.includes("bates")||s.includes("cole")||s.includes("nock"))return 0.82;
  if(s.includes("macredmond")||s.includes("hurdle")||s.includes("button")||s.includes("ward"))return 0.76;
  if(s.includes("maskiell")||s.includes("gordon")||s.includes("robbins")||s.includes("boyd"))return 0.70;
  if(s.includes("houston")||s.includes("kelly")||s.includes("boeuf")||s.includes("walters"))return 0.65;
  if(s.includes("a(1.5)"))return 0.74;if(s.includes("a(2)"))return 0.72;if(s.includes("a(3)"))return 0.68;
  return 0.55;
}

function parseRecord(s){
  if(!s)return null;
  if(typeof s==='object'&&s!==null&&'runs' in s)return{runs:+s.runs,wins:+s.wins,places:+s.places};
  const m=String(s).match(/(\d+):(\d+)-(\d+)/);if(!m)return null;
  return{runs:+m[1],wins:+m[2],places:+m[3]};
}

function wprScore(w,p,r){
  if(!r||r===0)return null;
  const rate=(+w+(+p)*0.6)/(+r);
  const conf=Math.min((+r)/5,1);
  const base=rate>=0.5?1.0:rate>=0.35?0.85:rate>=0.25?0.72:rate>=0.15?0.58:rate>=0.08?0.42:0.28;
  return base*conf+0.5*(1-conf);
}

function scoreMult(score, strength=1.25){
  if(score===null||score===undefined)return 1.0;
  return Math.pow(strength, (score-0.5)*2);
}

function formMultiplier(formStr){
  if(!formStr)return 1.0;
  const chars=formStr.replace(/[^0-9x]/gi,"").split("").reverse();
  if(!chars.length)return 1.0;
  const map={"1":10,"2":8,"3":6,"4":4,"5":3,"6":2,"7":1,"8":1,"9":0,"0":0,"x":0};
  let score=0,wsum=0;
  chars.forEach((c,i)=>{const w=i<3?3.0:i<6?1.5:0.7;score+=(map[c]??0)*w;wsum+=w*10;});
  const s=Math.min(score/wsum,1);
  return scoreMult(s, 1.30);
}

function classMult(fs){
  if(fs===null||fs===undefined||isNaN(parseFloat(fs)))return 1.0;
  const f=parseFloat(fs);
  const s=f<=-8?0.96:f<=-5?0.88:f<=-3?0.78:f<=-1?0.68:f<=1?0.58:f<=3?0.48:f<=5?0.38:f<=7?0.30:0.24;
  return scoreMult(s, 1.22);
}

function goingWeights(rg,trend){
  const imp=trend==="improving",det=trend==="deteriorating";
  if(rg==="soft"){if(imp)return{good:0.4,soft:0.8,heavy:0.1};if(det)return{good:0.0,soft:1.0,heavy:0.3};return{good:0.1,soft:1.0,heavy:0.2};}
  if(rg==="heavy"){if(imp)return{good:0.2,soft:0.6,heavy:0.8};if(det)return{good:0.0,soft:0.3,heavy:1.0};return{good:0.0,soft:0.4,heavy:1.0};}
  if(rg==="synthetic")return{good:0.5,soft:0.3,heavy:0.1};
  if(imp)return{good:1.0,soft:0.1,heavy:0.0};if(det)return{good:0.6,soft:0.5,heavy:0.1};
  return{good:1.0,soft:0.2,heavy:0.0};
}
function goingMult(gW,gP,gR,sW,sP,sR,hW,hP,hR,rg,trend){
  const gws=goingWeights(rg,trend);
  const gs=wprScore(+gW||0,+gP||0,+gR||0);
  const ss=wprScore(+sW||0,+sP||0,+sR||0);
  const hs=wprScore(+hW||0,+hP||0,+hR||0);
  const totalRuns=(+gR||0)+(+sR||0)+(+hR||0);
  if(totalRuns===0)return 1.0;
  let total=0,wsum=0;
  if(gws.good>0&&gs!==null){total+=gs*gws.good;wsum+=gws.good;}
  if(gws.soft>0&&ss!==null){total+=ss*gws.soft;wsum+=gws.soft;}
  if(gws.heavy>0&&hs!==null){total+=hs*gws.heavy;wsum+=gws.heavy;}
  const s=wsum>0?total/wsum:0.5;
  return scoreMult(s, 1.20);
}

function stableMult(trainer, jockey, stableCount){
  const tt=trainerTier(trainer);
  const jt=jockeyTier(jockey);
  const combined=tt*0.60+jt*0.40;
  const dilution=stableCount>1?Math.max(0.85,1-(stableCount-1)*0.07):1.0;
  return scoreMult(combined*dilution, 1.25);
}

function prepMult(r, days){
  const d=parseInt(days)||0;
  const rip=r.run_in_prep||(d===0?1:d>60?1:d>21?2:3);
  const rec=rip===1?parseRecord(r.first_up):rip===2?parseRecord(r.second_up):parseRecord(r.third_up);
  if(!rec||rec.runs===0)return 1.0;
  const s=wprScore(rec.wins,rec.places,rec.runs);
  return scoreMult(s===null?0.5:s, 1.22);
}

function trackMult(trkW,trkP,trkR,tdW,tdP,tdR){
  const totalTrkRuns=(+trkR||0)+(+tdR||0);
  if(totalTrkRuns===0)return 1.0;
  const trkS=wprScore(+trkW||0,+trkP||0,+trkR||0);
  const tdS=wprScore(+tdW||0,+tdP||0,+tdR||0);
  const best=(tdR>0&&tdS!==null)?Math.max(trkS||0.5,tdS):trkS;
  return scoreMult(best===null?0.5:best, 1.20);
}

function distMult(dW,dP,dR){
  if(!(+dR))return 1.0;
  const s=wprScore(+dW||0,+dP||0,+dR||0);
  return scoreMult(s===null?0.5:s, 1.18);
}

function spellMult(days, firstUpRec, trainer, hasTrialWin){
  const tier=trainerTier(trainer);
  const elite=tier>=0.88;
  const d=parseInt(days)||0;
  const rec=parseRecord(firstUpRec);
  const fuWinRate=rec&&rec.runs>0?rec.wins/rec.runs:0;
  const fuRate=rec&&rec.runs>0?(rec.wins+rec.places*0.4)/rec.runs:0;
  const provenFresh=rec&&rec.runs>=3&&fuWinRate>=0.50;
  const goodFresh=rec&&rec.runs>=2&&fuWinRate>=0.40;
  let s;
  if(d===0)s=0.55;
  else if(d<=6)s=0.50;
  else if(d<=10)s=0.68;
  else if(d<=14)s=0.90;
  else if(d<=21)s=1.00;
  else if(d<=35)s=0.88;
  else if(d<=60)s=0.75;
  else if(d<=100){
    if(provenFresh)s=0.88;
    else if(elite&&fuRate>=0.5)s=0.82;
    else if(elite)s=0.72;
    else if(goodFresh)s=0.70;
    else s=Math.max(0.42,fuRate*0.8+0.30);
  } else {
    if(provenFresh)s=0.82;
    else if(elite&&hasTrialWin)s=0.72;
    else if(elite&&fuRate>=0.5)s=0.68;
    else if(elite)s=0.58;
    else if(goodFresh)s=0.60;
    else s=Math.max(0.28,fuRate*0.6+0.20);
  }
  return scoreMult(s, 1.20);
}

function normaliseSect(sect,raceGoing,raceWeight,raceDist){
  if(!sect||!sect.last_600||sect.last_600<=0)return null;
  const goingThen=getGoingAdj(sect.going);const goingNow=getGoingAdj(raceGoing);
  const normToGood4=sect.last_600-goingThen;const adjToToday=normToGood4+goingNow;
  const diff=(sect.weight||raceWeight||57)-(raceWeight||57);
  const distFactor=Math.min((raceDist||1200)/1600,1.2);
  return adjToToday-diff*0.2*distFactor;
}
function sectMult(sectionals,raceGoing,raceWeight,raceDist){
  if(!sectionals||sectionals.length===0)return 1.0;
  const valid=sectionals.filter(s=>s&&s.last_600&&s.last_600>0&&!s.trial);
  if(valid.length===0)return 1.0;
  const normed=valid.map(s=>{
    const n=normaliseSect(s,raceGoing,raceWeight,raceDist);
    if(n===null)return null;
    const distDiff=Math.abs((s.distance||raceDist||1200)-(raceDist||1200));
    const distConf=distDiff>200?0.80:distDiff>100?0.90:1.0;
    return{val:n,distConf};
  }).filter(v=>v!==null);
  if(normed.length===0)return 1.0;
  const wts=normed.map((_,i)=>Math.pow(0.75,i));
  const wtSum=wts.reduce((a,b)=>a+b,0);
  const wtdTime=normed.reduce((s,v,i)=>s+v.val*wts[i],0)/wtSum;
  const timeScore=wtdTime<=33.0?1.0:wtdTime<=33.5?0.95:wtdTime<=34.0?0.88:wtdTime<=34.5?0.80:wtdTime<=35.0?0.70:wtdTime<=35.5?0.58:wtdTime<=36.0?0.45:wtdTime<=36.8?0.32:0.20;
  const avgDistConf=normed.reduce((s,v,i)=>s+v.distConf*wts[i],0)/wtSum;
  const conf=(valid.length>=2?Math.min(valid.length/3,1):Math.min(valid.length/3,1)*0.55)*avgDistConf;
  const s=timeScore*conf+0.5*(1-conf);
  return scoreMult(s, 1.14);
}

function placeMult(gW,gP,gR,sW,sP,sR,hW,hP,hR){
  const totalR=(+gR||0)+(+sR||0)+(+hR||0);
  if(totalR===0)return 1.0;
  const totalP=(+gP||0)+(+sP||0)+(+hP||0);
  const totalW=(+gW||0)+(+sW||0)+(+hW||0);
  const placeRate=(totalW+totalP)/totalR;
  const conf=Math.min(totalR/8,1);
  const base=placeRate>=0.5?1.0:placeRate>=0.35?0.85:placeRate>=0.25?0.70:placeRate>=0.15?0.55:0.35;
  const s=base*conf+0.5*(1-conf);
  const strength=totalR>=15?1.22:totalR>=8?1.18:1.15;
  return scoreMult(s, strength);
}

function tabSentiment(c){
  if(!c)return 1.0;const s=c.toLowerCase();let score=0.5;
  const sp=["hard to beat","take plenty of beating","will take catching","dominant","certain","fancied","terrific chance","can go one better","can win","pick up where"];
  const mp=["racing well","going well","thereabouts","key chance","rock hard fit","can measure up","fitter"];
  const mn=["place best","rough hope","rough chance","possible improver","see again"];
  const sn=["will struggle","hard to see","out of form","making up the numbers","looks tested","rates well below","fully tested"];
  sp.forEach(w=>{if(s.includes(w))score+=0.12;});mp.forEach(w=>{if(s.includes(w))score+=0.05;});
  mn.forEach(w=>{if(s.includes(w))score-=0.06;});sn.forEach(w=>{if(s.includes(w))score-=0.13;});
  score=Math.max(0.10,Math.min(0.95,score));
  return scoreMult(score, 1.12);
}

function weightMult(rWeight, minW, maxW){
  if(!rWeight||maxW===minW)return 1.0;
  const s=1-(rWeight-minW)/(maxW-minW);
  return scoreMult(Math.min(s,0.80), 1.10);
}

function edgeTag(prob,odds,tTier,isOverlay){
  if(!odds||isNaN(odds)||odds<=0)return null;
  const elite=(tTier||0)>=0.88;
  const marketProb=1/(odds*1.17);
  const edge=prob-marketProb;
  if(isOverlay)return{label:"OVERLAY",color:"#b07aff"};
  if(edge>0.07)return{label:"VALUE",color:"#00d4a0"};
  if(edge>0.025)return{label:"SLIGHT",color:"#f0c040"};
  if(edge<-0.10&&!(elite&&odds<=4.00))return{label:"AVOID",color:"#ff4455"};
  return{label:"FAIR",color:"#4a6070"};
}

function spreadQuality(probs){
  if(!probs||probs.length<2)return"weak";
  const sorted=[...probs].sort((a,b)=>b-a);
  const spread=sorted[0]-sorted[Math.min(2,sorted.length-1)];
  if(spread>0.08)return"strong";if(spread>0.04)return"moderate";return"weak";
}

// Accepts both object schema {"last_600":...} and array schema [{...}]
// Called once per runner before any sectionals logic runs
function normaliseSectionals(sectionals){
  if(!sectionals)return[];
  if(Array.isArray(sectionals))return sectionals;
  // Object schema — wrap in array, ensure position field present
  return[{...sectionals,position:sectionals.position??1}];
}

function analyze(runners, raceGoing, raceTrack, goingTrend, raceDist){
  const rg=detectGoing(raceGoing);
  const trend=goingTrend||"stable";
  const n=runners.length;
  const wts=runners.map(r=>+r.weight||0).filter(w=>w>0);
  const minW=wts.length?Math.min(...wts):50;
  const maxW=wts.length?Math.max(...wts):60;

  const stableCounts={};
  runners.forEach(r=>{const t=(r.trainer||"").toLowerCase();stableCounts[t]=(stableCounts[t]||0)+1;});

  const overround=1.17;

  const scored=runners.map(r=>{
    // ── v19.7 FIX: normalise sectionals before ANY signal reads it ─────────
    const sectionals=normaliseSectionals(r.sectionals);

    const rawImplied=r.win_odds&&r.win_odds>0?1/r.win_odds:1/n;
    const baseProb=rawImplied/overround;

    const days=parseInt(r.last_run_days)||0;
    const hasTrialWin=sectionals.some(s=>s.trial&&s.position===1);
    const stableCount=stableCounts[(r.trainer||"").toLowerCase()]||1;

    const recentChars=(r.form||"").replace(/[^0-9x]/gi,"").split("").reverse().slice(0,3);
    const recentWin=recentChars.includes("1")&&days<=21;
    const formBase=formMultiplier(r.form);
    const formFinal=recentWin?formBase*1.15:formBase;

    const mults={
      form:     formFinal,
      class_:   classMult(r.fs_rating),
      going:    goingMult(r.good_wins,r.good_places,r.good_runs,r.soft_wins,r.soft_places,r.soft_runs,r.heavy_wins,r.heavy_places,r.heavy_runs,rg,trend),
      stable:   stableMult(r.trainer,r.jockey,stableCount),
      prep:     prepMult(r,days),
      track:    trackMult(r.track_wins,r.track_places,r.track_runs,r.trk_dist_wins,r.trk_dist_places,r.trk_dist_runs),
      distance: distMult(r.dist_wins,r.dist_places,r.dist_runs),
      spell:    spellMult(days,r.first_up,r.trainer,hasTrialWin),
      sect:     sectMult(sectionals,raceGoing,r.weight,raceDist||1200),
      place:    placeMult(r.good_wins,r.good_places,r.good_runs,r.soft_wins,r.soft_places,r.soft_runs,r.heavy_wins,r.heavy_places,r.heavy_runs),
      tab:      tabSentiment(r.tab_comment),
      weight:   weightMult(r.weight,minW,maxW),
    };

    const multProduct=Object.values(mults).reduce((p,m)=>p*m,1);
    const adjusted=baseProb*multProduct;

    const convSignals=[];
    if(mults.form>1.10&&(r.form||"").slice(-4).includes("1"))convSignals.push("form");
    if(mults.class_>1.10&&mults.stable>1.05)convSignals.push("class+stable");
    if(mults.track>1.10&&(+r.trk_dist_wins||0)>=1)convSignals.push("trk_spec");
    if(mults.going>1.10)convSignals.push("going_spec");
    if(mults.prep>1.10)convSignals.push("prep");
    const convBonus=convSignals.length>=4?1.06:convSignals.length===3?1.04:convSignals.length===2?1.02:1.0;

    const final=adjusted*convBonus;

    const isOverlay=multProduct>=1.75&&baseProb<=0.09;
    const overlayBoost=isOverlay?1.40:1.0;

    const tTier=trainerTier(r.trainer);
    const absenceMult=(days>120&&tTier<0.80&&!hasTrialWin)?0.88:days>200&&!hasTrialWin?0.92:1.0;
    const fsVal=parseFloat(r.fs_rating)||0;
    const classRiseMult=fsVal>=8?0.88:fsVal>=6?0.93:1.0;

    const finalAdj=final*absenceMult*classRiseMult*overlayBoost;

    return{
      ...r,
      sectionals,  // store normalised version
      _baseProb:baseProb,
      _mults:mults,
      _multProduct:multProduct,
      _convSignals:convSignals,
      _convBonus:convBonus,
      _absenceMult:absenceMult,
      _classRiseMult:classRiseMult,
      _overlayBoost:overlayBoost,
      _isOverlay:isOverlay,
      _recentWin:recentWin,
      _finalAdj:finalAdj,
      _tTier:tTier,
      _hasTrialWin:hasTrialWin,
      _placeSc:placeMult(r.good_wins,r.good_places,r.good_runs,r.soft_wins,r.soft_places,r.soft_runs,r.heavy_wins,r.heavy_places,r.heavy_runs),
    };
  });

  const total=scored.reduce((s,r)=>s+r._finalAdj,0);
  const withProb=scored.map(r=>({...r,prob:r._finalAdj/total})).sort((a,b)=>b.prob-a.prob);
  const spread=spreadQuality(withProb.map(r=>r.prob));
  return{runners:withProb,spread};
}

function normaliseSectional(sect,raceGoing,raceWeight,raceDistance){
  if(!sect||!sect.last_600||sect.last_600<=0)return null;
  const goingThen=getGoingAdj(sect.going);const goingNow=getGoingAdj(raceGoing);
  const normToGood4=sect.last_600-goingThen;const adjToToday=normToGood4+goingNow;
  const diff=(sect.weight||raceWeight||57)-(raceWeight||57);
  const distFactor=Math.min((raceDistance||1200)/1600,1.2);
  return adjToToday-diff*0.2*distFactor;
}

const MULT_LABELS={form:"FORM",class_:"CLASS",going:"GOING",stable:"STABLE/JOC",prep:"PREP CYCLE",track:"TRACK AFF",distance:"DISTANCE",spell:"SPELL",sect:"SECTIONALS",place:"PLACE HIST",tab:"TAB",weight:"WEIGHT"};

function App(){
  const [results,setResults]=useState(null);
  const [tab,setTab]=useState("load");
  const [json,setJson]=useState("");
  const [err,setErr]=useState("");
  const [race,setRace]=useState(null);

  function run(){
    setErr("");
    try{
      const parsed=JSON.parse(json);
      const data=parsed.runners?parsed:{runners:parsed};
      if(!Array.isArray(data.runners))throw new Error("No runners array found");
      const r=data.race||{};setRace(r);
      const res=analyze(data.runners,r.going||"",r.track||"",r.going_trend||"stable",r.distance||1200);
      setResults(res);setTab("results");
    }catch(e){setErr(e.message);}
  }

  const top=results?.runners?.[0];
  const spread=results?.spread;
  const rg=detectGoing(race?.going||"");
  const gws=goingWeights(rg,race?.going_trend||"stable");

  function formatSect(r){
    if(!r.sectionals)return null;
    const sects=r.sectionals||[];
    return sects.filter(s=>!s.trial&&s.last_600>0).map(s=>{
      const n=normaliseSectional(s,race?.going||"",r.weight,race?.distance||1200);
      return`${s.last_600}s(${s.going||"?"}/${s.weight||"?"}kg)→${n?n.toFixed(2):"?"}adj`;
    }).join(" · ");
  }

  function multBar(mult){
    const pct=Math.min(Math.max((mult-0.6)/0.8*100,0),100);
    const col=mult>1.10?"#00d4a0":mult>1.0?"#f0c040":mult<0.90?"#ff4455":"#4a6070";
    return{pct,col,label:mult.toFixed(3)};
  }

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'Courier New',monospace",paddingBottom:60}}>
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"14px 20px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:10,color:C.accent,letterSpacing:4,fontWeight:900}}>FORM</span>
        <span style={{fontSize:18,fontWeight:900,letterSpacing:-1}}>BOARD</span>
        <span style={{fontSize:9,color:C.muted,marginLeft:4}}>v19.7</span>
        <span style={{marginLeft:"auto",fontSize:8,color:C.muted,letterSpacing:1}}>BAYESIAN MULT · FRESH PERFORMER OVERRIDE · FINAL</span>
      </div>

      <div style={{maxWidth:820,margin:"0 auto",padding:"0 8px"}}>

        {race?.track&&(
          <div style={{margin:"12px 0 0",background:C.panel,border:`1px solid ${C.accentDim}`,borderLeft:`3px solid ${C.accent}`,padding:"8px 12px",fontSize:11,display:"flex",flexWrap:"wrap",gap:"4px 14px",alignItems:"center"}}>
            <span style={{color:C.accent,fontWeight:700}}>{race.track?.toUpperCase()}</span>
            <span style={{color:C.muted}}>{race.distance}m · {race.class}</span>
            <span style={{color:C.gold,fontWeight:700}}>{race.going}</span>
            {race.prize_money&&<span style={{color:C.muted}}>${(+race.prize_money).toLocaleString()}</span>}
            {spread&&<span style={{marginLeft:"auto",fontSize:8,color:spread==="strong"?C.accent:spread==="moderate"?C.gold:C.red,letterSpacing:1}}>SPREAD: {spread.toUpperCase()}</span>}
            <span style={{fontSize:8,color:C.muted,width:"100%"}}>
              GOOD <span style={{color:C.accent}}>{(gws.good*100).toFixed(0)}%</span> · SOFT <span style={{color:C.accent}}>{(gws.soft*100).toFixed(0)}%</span> · HEAVY <span style={{color:C.purple}}>{(gws.heavy*100).toFixed(0)}%</span>
              {race.going_trend&&race.going_trend!=="stable"&&<span style={{color:C.gold}}> · {race.going_trend.toUpperCase()}</span>}
            </span>
          </div>
        )}

        <div style={{display:"flex",marginTop:12,borderBottom:`1px solid ${C.border}`}}>
          {["load","results"].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{background:tab===t?C.panel:"transparent",color:tab===t?C.accent:C.muted,border:"none",borderBottom:tab===t?`2px solid ${C.accent}`:"2px solid transparent",padding:"7px 16px",fontFamily:"inherit",fontSize:10,letterSpacing:1.5,cursor:"pointer",textTransform:"uppercase"}}>
              {t==="load"?"LOAD RACE":"RESULTS"}
            </button>
          ))}
        </div>

        {tab==="load"&&(
          <div style={{marginTop:12}}>
            <div style={{fontSize:10,color:C.accent,letterSpacing:1.5,marginBottom:6}}>PASTE RACE JSON</div>
            <div style={{fontSize:9,color:C.muted,marginBottom:8,lineHeight:1.7,background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:"10px 12px"}}>
              <span style={{color:C.gold}}>v19.7 — Bayesian Multiplicative Engine.</span> Market odds = base probability. Each signal applies an independent multiplier (×1.0 = neutral/no data, &gt;1.0 = lifts, &lt;1.0 = discounts). No signal can bury a runner when data is absent.
            </div>
            <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:"10px 12px",fontSize:9,color:C.muted,marginBottom:10,lineHeight:1.8}}>
              Sectionals accept both <span style={{color:C.accent}}>object</span> and <span style={{color:C.accent}}>array</span> schema. Uses <span style={{color:C.accent}}>"last_600"</span> field.
            </div>
            <textarea value={json} onChange={e=>setJson(e.target.value)}
              placeholder='{"race":{"track":"Caulfield","distance":1000,"class":"3YO Open Handicap","going":"Soft 7","going_trend":"stable","prize_money":150000},"runners":[...]}'
              style={{width:"100%",height:200,background:C.panel,border:`1px solid ${C.border}`,color:C.text,fontFamily:"inherit",fontSize:11,padding:10,resize:"vertical",outline:"none",borderRadius:4}}/>
            {err&&<div style={{color:C.red,fontSize:10,marginTop:4}}>⚠ {err}</div>}
            <button onClick={run} style={{marginTop:10,width:"100%",background:C.accent,color:"#000",border:"none",padding:"12px",fontFamily:"inherit",fontSize:11,fontWeight:700,letterSpacing:2,cursor:"pointer",borderRadius:3}}>LOAD AND RUN</button>
          </div>
        )}

        {tab==="results"&&results&&(
          <div style={{marginTop:12}}>
            {spread==="weak"&&(
              <div style={{background:"#1a0a0a",border:`1px solid ${C.red}`,borderRadius:4,padding:"8px 12px",marginBottom:10,fontSize:9,color:C.red,letterSpacing:1}}>
                ⚠ WEAK SPREAD — model cannot separate field. Reduce stakes or pass.
              </div>
            )}

            {top&&(
              <div style={{background:C.panel,border:`1px solid ${C.accent}`,borderRadius:4,padding:"12px 14px",marginBottom:14}}>
                <div style={{fontSize:9,color:C.accent,letterSpacing:3,marginBottom:4}}>TOP PICK</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                  <div>
                    <div style={{fontSize:16,fontWeight:900}}>{top.name} <span style={{fontSize:10,color:C.muted,fontWeight:400}}>(B{top.barrier})</span></div>
                    <div style={{fontSize:9,color:C.muted,marginTop:2}}>{top.trainer} · F:{top.form} · {top.weight?top.weight+"kg":"?kg"}</div>
                    <div style={{fontSize:8,color:C.blue,marginTop:2}}>base {(top._baseProb*100).toFixed(1)}% → adjusted {(top.prob*100).toFixed(1)}%</div>
                    {top._convSignals?.length>=2&&<div style={{fontSize:8,color:C.accent,marginTop:2}}>★ {top._convSignals.join(" · ")}</div>}
                    {formatSect(top)&&<div style={{fontSize:8,color:C.orange,marginTop:2}}>{formatSect(top)}</div>}
                    {top._placeSc>1.08&&<div style={{fontSize:8,color:C.blue,marginTop:2}}>↑ strong place history</div>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:22,fontWeight:900,color:C.accent}}>{(top.prob*100).toFixed(1)}%</div>
                    <div style={{fontSize:10,color:C.muted}}>WIN ${top.win_odds}</div>
                  </div>
                </div>
                {edgeTag(top.prob,top.win_odds,top._tTier,top._isOverlay)&&(
                  <div style={{marginTop:8,fontSize:9,fontWeight:700,letterSpacing:2,color:edgeTag(top.prob,top.win_odds,top._tTier,top._isOverlay).color,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
                    {edgeTag(top.prob,top.win_odds,top._tTier,top._isOverlay).label} — {((top.prob-(1/(top.win_odds*1.17)))*100).toFixed(1)}% edge
                  </div>
                )}
              </div>
            )}

            <div style={{fontSize:8,color:C.muted,letterSpacing:1,marginBottom:4,display:"grid",gridTemplateColumns:"20px 1fr 44px 46px 46px 52px",gap:4,padding:"0 6px"}}>
              <span/><span>RUNNER</span><span style={{textAlign:"right"}}>PROB</span><span style={{textAlign:"right"}}>WIN</span><span style={{textAlign:"right"}}>PLC</span><span style={{textAlign:"right"}}>EDGE</span>
            </div>

            {results.runners.map((r,i)=>{
              const tag=edgeTag(r.prob,r.win_odds,r._tTier,r._isOverlay);
              const hasSect=(r.sectionals||[]).some(s=>!s.trial&&s.last_600>0);
              const normedBest=hasSect?Math.min(...(r.sectionals||[]).filter(s=>!s.trial&&s.last_600>0).map(s=>normaliseSectional(s,race?.going||"",r.weight,race?.distance||1200)).filter(v=>v!==null)):null;
              return(
                <div key={r.name} style={{display:"grid",gridTemplateColumns:"20px 1fr 44px 46px 46px 52px",gap:4,padding:"9px 6px",background:i%2===0?C.panel:C.alt,borderBottom:`1px solid ${C.border}`,alignItems:"center",borderLeft:hasSect?`3px solid ${C.orange}`:`3px solid transparent`}}>
                  <span style={{fontSize:10,color:i===0?C.accent:C.muted,fontWeight:i===0?700:400}}>{i+1}</span>
                  <div>
                    <div style={{fontSize:11,fontWeight:i<3?700:400,color:i===0?C.text:"#a0b4c0"}}>{r.name}</div>
                    <div style={{fontSize:8,color:C.muted}}>{r.trainer?.split(" ").slice(-1)[0]} · F:{r.form} · {r.weight?r.weight+"kg":"?kg"}</div>
                    <div style={{fontSize:8,color:C.blue}}>base {(r._baseProb*100).toFixed(1)}% × {r._multProduct?.toFixed(3)}</div>
                    {hasSect&&normedBest&&<div style={{fontSize:8,color:C.orange}}>adj {normedBest.toFixed(2)}s</div>}
                    {r._convSignals?.length>=2&&<div style={{fontSize:8,color:C.accent}}>★ {r._convSignals.length} conv</div>}
                    {r._absenceMult<1&&<div style={{fontSize:8,color:C.red}}>↓ absence ×{r._absenceMult?.toFixed(2)}</div>}
                    {r._classRiseMult<1&&<div style={{fontSize:8,color:C.red}}>↓ class rise ×{r._classRiseMult?.toFixed(2)}</div>}
                    {r._isOverlay&&<div style={{fontSize:8,color:C.purple}}>◆ OVERLAY — signals vs market diverge</div>}
                    {r._recentWin&&<div style={{fontSize:8,color:C.accent}}>↑ recent win kicker</div>}
                    {r._placeSc>1.08&&<div style={{fontSize:8,color:C.blue}}>EW ↑</div>}
                  </div>
                  <span style={{textAlign:"right",fontSize:12,fontWeight:700,color:i===0?C.accent:C.text}}>{(r.prob*100).toFixed(1)}%</span>
                  <span style={{textAlign:"right",fontSize:11}}>{r.win_odds>0?`$${r.win_odds}`:"-"}</span>
                  <span style={{textAlign:"right",fontSize:11,color:C.muted}}>{r.place_odds?`$${r.place_odds}`:"-"}</span>
                  <span style={{textAlign:"right",fontSize:9,fontWeight:700,letterSpacing:1,color:tag?.color??C.muted}}>{tag?.label??"-"}</span>
                </div>
              );
            })}

            <div style={{marginTop:16,fontSize:9,color:C.muted,letterSpacing:1.5,marginBottom:8}}>MULTIPLIER BREAKDOWN — TOP 3</div>
            {results.runners.slice(0,3).map((r,i)=>(
              <div key={r.name} style={{background:C.panel,border:`1px solid ${i===0?C.accentDim:C.border}`,borderRadius:4,padding:"10px 14px",marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                  <span style={{fontSize:11,fontWeight:700,color:i===0?C.accent:C.text}}>{r.name}</span>
                  <span style={{fontSize:10,color:C.muted}}>{(r.prob*100).toFixed(1)}%</span>
                </div>
                <div style={{fontSize:8,color:C.blue,marginBottom:8}}>base {(r._baseProb*100).toFixed(1)}% × mults {r._multProduct?.toFixed(3)} = adj {(r._finalAdj*100).toFixed(2)}%</div>
                {formatSect(r)&&<div style={{fontSize:8,color:C.orange,marginBottom:6,lineHeight:1.6}}>{formatSect(r)}</div>}
                {r._mults&&Object.entries(r._mults).map(([k,v])=>{
                  const{pct,col,label}=multBar(v);
                  const neutral=Math.abs(v-1.0)<0.005;
                  return(
                    <div key={k} style={{marginBottom:4}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:1}}>
                        <span style={{fontSize:8,color:neutral?C.muted:col,letterSpacing:1}}>{MULT_LABELS[k]||k}{neutral?" (no data)":""}</span>
                        <span style={{fontSize:8,color:col,fontWeight:neutral?400:700}}>{label}</span>
                      </div>
                      <div style={{height:3,background:C.border,borderRadius:2}}>
                        <div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:2}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}

        <div style={{marginTop:14,padding:"8px 10px",background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,fontSize:8,display:"flex",flexWrap:"wrap",gap:"3px 14px"}}>
          <span style={{color:"#00d4a0"}}>VALUE &gt;7%</span>
          <span style={{color:"#f0c040"}}>SLIGHT 2.5-7%</span>
          <span style={{color:"#4a6070"}}>FAIR</span>
          <span style={{color:"#ff4455"}}>AVOID &lt;−10%</span>
          <span style={{color:C.blue}}>base% = market anchor</span>
          <span style={{color:C.accent}}>★ convergence</span>
          <span style={{color:C.orange}}>● sectionals</span>
          <span style={{color:C.blue}}>EW↑ place hist</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
