const {useState}=React;

const C={
  bg:"#06090d",panel:"#0d1520",border:"#182030",
  accent:"#00d4a0",accentDim:"#004433",
  gold:"#f0c040",red:"#ff4455",blue:"#4db0ff",

  text:"#cdd8e3",muted:"#4a6070",alt:"#0a1018",
};

// ─── WEIGHTS v19.2 ─────────────────────────────────────────────────────────
// Market anchor increased to 25%. Spell reduced to make room.
// Softmax amplification applied post-scoring to widen spread.
const W={
  marketImplied:   0.25,  // ↑ from 0.18 — primary anchor, market knows most
  recentForm:      0.13,  // recency-weighted last 3 starts
  classSignal:     0.09,  // log-dampened FS rating
  goingPref:       0.08,  // going specialist
  trainerJockey:   0.09,  // combined Victorian tier
  prepCycle:       0.08,  // run-in-prep record
  trackAffinity:   0.08,  // ↑ track affinity
  distancePref:    0.05,  // adjusted
  sectionalScore:  0.06,  // last_600 normalised
  spellFactor:     0.04,  // unchanged  // stable-adjusted, floor for elite resumers
  placeHistory:    0.05,  // ↑ place specialists undervalued
  weightHandicap:  0.02,  // relative weight
};
const WSUM=Object.values(W).reduce((a,b)=>a+b,0);

// ─── SOFTMAX AMPLIFICATION ─────────────────────────────────────────────────
// Stretches probability distribution so winners score 20-30% not 12%
// Temperature < 1 = sharper, more decisive. We use 0.55.
function softmax(scores, temperature=0.40){
  const scaled=scores.map(s=>s/temperature);
  const maxS=Math.max(...scaled);
  const exps=scaled.map(s=>Math.exp(s-maxS)); // subtract max for numerical stability
  const sum=exps.reduce((a,b)=>a+b,0);
  return exps.map(e=>e/sum);
}

// ─── GOING ─────────────────────────────────────────────────────────────────
const GOING_ADJ={"firm":-0.8,"good3":-0.4,"good4":0,"good":0,"soft5":0.8,"soft6":1.4,"soft7":2.0,"soft":0.8,"heavy8":2.8,"heavy9":3.6,"heavy10":4.5,"heavy":2.8,"synthetic":0};
function getGoingKey(g){
  if(!g)return"good4";const s=g.toLowerCase().replace(/[^a-z0-9]/g,"");
  if(s.includes("synthetic")||s.includes("awt"))return"synthetic";
  if(s.includes("heavy10"))return"heavy10";if(s.includes("heavy9"))return"heavy9";if(s.includes("heavy8"))return"heavy8";if(s.includes("heavy"))return"heavy";
  if(s.includes("soft7"))return"soft7";if(s.includes("soft6"))return"soft6";if(s.includes("soft5"))return"soft5";if(s.includes("soft"))return"soft";
  if(s.includes("good3"))return"good3";if(s.includes("good4"))return"good4";if(s.includes("good"))return"good4";
  if(s.includes("firm"))return"firm";return"good4";
}
function detectGoing(g){if(!g)return"good";const s=g.toLowerCase();if(s.includes("heavy"))return"heavy";if(s.includes("soft"))return"soft";if(s.includes("synthetic")||s.includes("awt"))return"synthetic";return"good";}
function getGoingAdj(g){return GOING_ADJ[getGoingKey(g)]??0;}

// ─── TRAINER TIERS — Victorian circuit ────────────────────────────────────
function trainerTier(t){
  const s=(t||"").toLowerCase();
  if(s.includes("waller")||s.includes("mcevoy")||s.includes("maher")||s.includes("eustace"))return 1.00;
  if(s.includes("snowden")||s.includes("cunningham")||s.includes("hayes"))return 0.92;
  if(s.includes("lees")||s.includes("archibald")||s.includes("annabel")||s.includes("freedman"))return 0.88;
  if(s.includes("chalmers")||s.includes("zahra")||s.includes("archard")||s.includes("goodwin"))return 0.80;
  if(s.includes("wilde")||s.includes("dyer")||s.includes("brisbourne")||s.includes("lake"))return 0.75;
  if(s.includes("dwyer")||s.includes("o'prey")||s.includes("vella")||s.includes("weir"))return 0.72;
  if(s.includes("clarken")||s.includes("gascoyne")||s.includes("birnie")||s.includes("o'sullivan"))return 0.70;
  if(s.includes("walters")||s.includes("jolly")||s.includes("boyd")||s.includes("gollan"))return 0.65;
  if(s.includes("conners")||s.includes("price")||s.includes("baker")||s.includes("ryan"))return 0.62;
  return 0.50;
}

// ─── JOCKEY TIERS ──────────────────────────────────────────────────────────
function jockeyTier(j){
  const s=(j||"").toLowerCase();
  if(s.includes("rawiller")||s.includes("mcdonald")||s.includes("oliver"))return 0.96;
  if(s.includes("coffey")||s.includes("shinn")||s.includes("allen")||s.includes("mccormick"))return 0.90;
  if(s.includes("king")||s.includes("bates")||s.includes("cole")||s.includes("nock"))return 0.82;
  if(s.includes("macredmond")||s.includes("hurdle")||s.includes("button")||s.includes("ward"))return 0.76;
  if(s.includes("maskiell")||s.includes("gordon")||s.includes("robbins")||s.includes("boyd"))return 0.70;
  if(s.includes("houston")||s.includes("kelly")||s.includes("boeuf")||s.includes("walters"))return 0.65;
  if(s.includes("a(1.5)"))return 0.74;if(s.includes("a(2)"))return 0.72;if(s.includes("a(3)"))return 0.68;
  return 0.55;
}

// ─── SPELL — elite stable floor ───────────────────────────────────────────
// FIX: Elite stable (tier>=0.88) + first-up win record = minimum floor 0.78
// This stops McEvoy/Maher/Waller resumers being unfairly penalised
function spellScore(days, firstUpRec, trainer, hasTrialWin){
  const tier=trainerTier(trainer);
  const elite=tier>=0.88;
  const d=parseInt(days)||0;
  const rec=parseRecord(firstUpRec);
  const firstUpWinRate=rec&&rec.runs>0?(rec.wins+rec.places*0.4)/rec.runs:0;

  if(d===0)return 0.55;
  if(d<=6)return 0.50;
  if(d<=10)return 0.68;
  if(d<=14)return 0.90;
  if(d<=21)return 1.00;
  if(d<=35)return 0.88;
  if(d<=60)return 0.75;

  // 61-100 days
  if(d<=100){
    const base=elite?0.72:firstUpWinRate>0.4?0.68:firstUpWinRate>0.2?0.55:0.42;
    // Elite stable floor: if they have a first-up win, floor at 0.78
    if(elite&&firstUpWinRate>=0.5)return Math.max(base,0.78);
    return base;
  }

  // 100+ days
  if(elite&&hasTrialWin)return 0.72;
  if(elite&&firstUpWinRate>=0.5)return 0.68;
  if(elite)return 0.58;
  if(firstUpWinRate>=0.4)return 0.50;
  return 0.30;
}

// ─── MARKET IMPLIED — now 25% weight, primary anchor ─────────────────────
// Overround-adjusted true probability relative to field baseline
function marketScore(winOdds, fieldSize){
  if(!winOdds||isNaN(winOdds)||winOdds<=0)return 0.5;
  const implied=1/winOdds;
  const overround=1.17;
  const trueProb=implied/overround;
  const baseline=1/((fieldSize||10)*overround);
  const ratio=trueProb/baseline;
  // Steeper curve now — we need more differentiation
  if(ratio>=5.0)return 1.00;
  if(ratio>=3.5)return 0.96;
  if(ratio>=2.5)return 0.90;
  if(ratio>=1.8)return 0.82;
  if(ratio>=1.3)return 0.72;
  if(ratio>=1.0)return 0.62;
  if(ratio>=0.7)return 0.50;
  if(ratio>=0.5)return 0.38;
  return 0.26;
}

// ─── CLASS — log dampened ──────────────────────────────────────────────────
function classScore(fs){
  if(fs===null||fs===undefined||isNaN(parseFloat(fs)))return 0.5;
  const f=parseFloat(fs);
  if(f<=-8)return 0.96;if(f<=-5)return 0.88;if(f<=-3)return 0.78;
  if(f<=-1)return 0.68;if(f<=1)return 0.58;if(f<=3)return 0.48;
  if(f<=5)return 0.38;if(f<=7)return 0.30;return 0.24;
}

// ─── GOING WEIGHTS ─────────────────────────────────────────────────────────
function goingWeights(rg,trend){
  const imp=trend==="improving",det=trend==="deteriorating";
  if(rg==="soft"){if(imp)return{good:0.4,soft:0.8,heavy:0.1};if(det)return{good:0.0,soft:1.0,heavy:0.3};return{good:0.1,soft:1.0,heavy:0.2};}
  if(rg==="heavy"){if(imp)return{good:0.2,soft:0.6,heavy:0.8};if(det)return{good:0.0,soft:0.3,heavy:1.0};return{good:0.0,soft:0.4,heavy:1.0};}
  if(rg==="synthetic")return{good:0.5,soft:0.3,heavy:0.1};
  if(imp)return{good:1.0,soft:0.1,heavy:0.0};if(det)return{good:0.6,soft:0.5,heavy:0.1};
  return{good:1.0,soft:0.2,heavy:0.0};
}
function scoreWPR(w,p,r){
  if(!r||r===0)return null;
  const rate=(w+p*0.6)/r;const conf=Math.min(r/5,1);
  const base=rate>=0.5?1.0:rate>=0.35?0.85:rate>=0.25?0.72:rate>=0.15?0.58:rate>=0.08?0.42:0.28;
  return base*conf+0.5*(1-conf);
}
function scoreWPRN(w,p,r){const s=scoreWPR(w,p,r);return s===null?0.5:s;}
function scoreGoing(ex,rg,trend){
  const gw=goingWeights(rg,trend||"stable");
  const gs=scoreWPR(+ex.good_wins||0,+ex.good_places||0,+ex.good_runs||0);
  const ss=scoreWPR(+ex.soft_wins||0,+ex.soft_places||0,+ex.soft_runs||0);
  const hs=scoreWPR(+ex.heavy_wins||0,+ex.heavy_places||0,+ex.heavy_runs||0);
  if(gs===null&&ss===null&&hs===null)return 0.5;
  let total=0,wsum=0;
  if(gw.good>0){total+=(gs!==null?gs:0.5)*gw.good;wsum+=gw.good;}
  if(gw.soft>0){total+=(ss!==null?ss:0.5)*gw.soft;wsum+=gw.soft;}
  if(gw.heavy>0){total+=(hs!==null?hs:0.5)*gw.heavy;wsum+=gw.heavy;}
  return wsum>0?total/wsum:0.5;
}

// ─── RECENT FORM — last 3 starts 3× weight ────────────────────────────────
function recentFormScore(formStr){
  if(!formStr)return 0.35;
  const chars=formStr.replace(/[^0-9x]/gi,"").split("").reverse();
  if(!chars.length)return 0.35;
  const map={"1":10,"2":8,"3":6,"4":4,"5":3,"6":2,"7":1,"8":1,"9":0,"0":0,"x":0};
  let score=0,wsum=0;
  chars.forEach((c,i)=>{const w=i<3?3.0:i<6?1.5:0.7;score+=(map[c]??0)*w;wsum+=w*10;});
  return Math.min(score/wsum,1);
}

// ─── PLACE HISTORY ─────────────────────────────────────────────────────────
function placeHistoryScore(gW,gP,gR,sW,sP,sR,hW,hP,hR){
  const totalRuns=(+gR||0)+(+sR||0)+(+hR||0);
  const totalPlaces=(+gP||0)+(+sP||0)+(+hP||0);
  const totalWins=(+gW||0)+(+sW||0)+(+hW||0);
  if(totalRuns===0)return 0.5;
  const placeRate=(totalWins+totalPlaces)/totalRuns;
  const conf=Math.min(totalRuns/6,1);
  const base=placeRate>=0.5?1.0:placeRate>=0.35?0.85:placeRate>=0.25?0.70:placeRate>=0.15?0.55:0.35;
  return base*conf+0.5*(1-conf);
}

// ─── PREP CYCLE ────────────────────────────────────────────────────────────
function parseRecord(s){
  if(!s)return null;
  if(typeof s==='object'&&s!==null&&'runs' in s)return{runs:+s.runs,wins:+s.wins,places:+s.places};
  const m=String(s).match(/(\d+):(\d+)-(\d+)/);if(!m)return null;
  return{runs:+m[1],wins:+m[2],places:+m[3]};
}
function prepCycleScore(r,days){
  const d=parseInt(days)||0;
  const rip=r.run_in_prep||(d===0?1:d>60?1:d>21?2:3);
  const rec=rip===1?parseRecord(r.first_up):rip===2?parseRecord(r.second_up):parseRecord(r.third_up);
  if(!rec)return 0.5;
  return scoreWPRN(rec.wins,rec.places,rec.runs);
}

// ─── BARRIER ───────────────────────────────────────────────────────────────
function barrierScore(b,n,track,distance){
  const t=(track||"").toLowerCase();const d=distance||1200;
  if(t.includes("warwick")){if(b<=2)return 1.0;if(b<=4)return 0.88;if(b<=6)return 0.72;if(b<=8)return 0.55;return 0.32;}
  if(d>=1600){if(b<=4)return 0.80;if(b<=8)return 0.75;if(b<=12)return 0.68;return 0.60;}
  if(b<=3)return 0.88;if(b<=6)return 0.78;if(b<=9)return 0.65;if(b<=12)return 0.52;return 0.40;
}

// ─── SECTIONALS ────────────────────────────────────────────────────────────
function normaliseSectional(sect,raceGoing,raceWeight,raceDistance){
  if(!sect||!sect.last_600||sect.last_600<=0)return null;
  const goingThen=getGoingAdj(sect.going);const goingNow=getGoingAdj(raceGoing);
  const normToGood4=sect.last_600-goingThen;const adjToToday=normToGood4+goingNow;
  const diff=(sect.weight||raceWeight||57)-(raceWeight||57);
  const distFactor=Math.min((raceDistance||1200)/1600,1.2);
  return adjToToday-diff*0.2*distFactor;
}
function scoreSectionals(sectionals,raceGoing,raceWeight,raceDistance){
  if(!sectionals||sectionals.length===0)return 0.5;
  const valid=sectionals.filter(s=>s&&s.last_600&&s.last_600>0&&!s.trial);
  if(valid.length===0)return 0.5;
  const normed=valid.map(s=>normaliseSectional(s,raceGoing,raceWeight,raceDistance)).filter(v=>v!==null);
  if(normed.length===0)return 0.5;
  const weights=normed.map((_,i)=>Math.pow(0.7,i));
  const weightedBest=normed.reduce((best,v,i)=>i===0?v:Math.min(best,v*weights[i]+(normed[0]*(1-weights[i]))),normed[0]);
  const timeScore=weightedBest<=33.0?1.0:weightedBest<=33.5?0.95:weightedBest<=34.0?0.88:weightedBest<=34.5?0.80:weightedBest<=35.0?0.70:weightedBest<=35.5?0.58:weightedBest<=36.0?0.45:weightedBest<=36.8?0.32:0.20;
  let trendBonus=0;
  if(normed.length>=2){const trend=normed[0]-normed[normed.length-1];trendBonus=Math.max(-0.12,Math.min(0.12,-trend*0.07));}
  const conf=Math.min(valid.length/3,1);
  return Math.min(1,Math.max(0,timeScore+trendBonus))*conf+0.5*(1-conf);
}

// ─── TAB SENTIMENT ─────────────────────────────────────────────────────────
function tabSentiment(c){
  if(!c)return 0.5;const s=c.toLowerCase();let score=0.5;
  const sp=["hard to beat","take plenty of beating","will take catching","dominant","certain","ideal","fancied","terrific chance","can go one better","can win","pick up where"];
  const mp=["racing well","going well","positive return","thereabouts","key chance","rock hard fit","can measure up","place chance","each-way","fitter"];
  const mn=["place best","deserves chance","rough hope","rough chance","possible improver","see again"];
  const sn=["will struggle","hard to see","out of form","making up the numbers","looks tested","rates well below","struggle against","fully tested"];
  sp.forEach(w=>{if(s.includes(w))score+=0.13;});mp.forEach(w=>{if(s.includes(w))score+=0.05;});
  mn.forEach(w=>{if(s.includes(w))score-=0.06;});sn.forEach(w=>{if(s.includes(w))score-=0.14;});
  return Math.max(0.10,Math.min(0.95,score));
}

// ─── EDGE TAG — AVOID only at −10% ────────────────────────────────────────
function edgeTag(prob,odds,trainerT){
  const elite=(trainerT||0)>=0.88;
  if(!odds||isNaN(odds)||odds<=0)return null;
  const marketProb=1/(odds*1.17);
  const edge=prob-marketProb;
  if(edge>0.07)return{label:"VALUE",color:"#00d4a0"};
  if(edge>0.025)return{label:"SLIGHT",color:"#f0c040"};
  if(edge<-0.10&&!(elite&&odds<=4.00))return{label:"AVOID",color:"#ff4455"};
  return{label:"FAIR",color:"#4a6070"};
}

// ─── SPREAD QUALITY ────────────────────────────────────────────────────────
function spreadQuality(probs){
  if(!probs||probs.length<2)return"weak";
  const sorted=[...probs].sort((a,b)=>b-a);
  const spread=sorted[0]-sorted[Math.min(2,sorted.length-1)];
  if(spread>0.08)return"strong";if(spread>0.04)return"moderate";return"weak";
}

// ─── CONVERGENCE ───────────────────────────────────────────────────────────
function convergenceCheck(r,rg,trend,merged,formScore,mktSc,classSc){
  const signals=[];
  if(formScore>=0.70&&(r.form||"").slice(-6).includes("1"))signals.push("form");
  if(mktSc>=0.80&&classSc>=0.68)signals.push("mkt+class");
  const trkW=+r.trk_dist_wins||0,trkR=+r.trk_dist_runs||0;
  if(trkW>=1&&trkR>=2)signals.push("trk_spec");
  const goingW=rg==="good"?(+merged.good_wins||0):rg==="soft"?(+merged.soft_wins||0):(+merged.heavy_wins||0);
  const goingR=rg==="good"?(+merged.good_runs||0):rg==="soft"?(+merged.soft_runs||0):(+merged.heavy_runs||0);
  if(goingW>=2&&goingR>=4)signals.push("going_spec");
  const d=parseInt(r.last_run_days)||0;
  const rip=r.run_in_prep||(d===0?1:d>60?1:d>21?2:3);
  const rec=rip===1?parseRecord(r.first_up):rip===2?parseRecord(r.second_up):parseRecord(r.third_up);
  if(rec&&rec.runs>=3&&rec.wins>=1)signals.push("prep");
  return signals;
}

// ─── MAIN ANALYZE ──────────────────────────────────────────────────────────
function analyze(runners,raceGoing,raceTrack,goingTrend,raceDistance){
  const rg=detectGoing(raceGoing);
  const trend=goingTrend||"stable";
  const n=runners.length;
  const wts=runners.map(r=>+r.weight||0).filter(w=>w>0);
  const minW=wts.length?Math.min(...wts):50;
  const maxW=wts.length?Math.max(...wts):60;
  const stableCounts={};
  runners.forEach(r=>{const t=(r.trainer||"").toLowerCase();stableCounts[t]=(stableCounts[t]||0)+1;});

  const scored=runners.map(r=>{
    const merged={
      good_wins:+r.good_wins||0,good_places:+r.good_places||0,good_runs:+r.good_runs||0,
      soft_wins:+r.soft_wins||0,soft_places:+r.soft_places||0,soft_runs:+r.soft_runs||0,
      heavy_wins:+r.heavy_wins||0,heavy_places:+r.heavy_places||0,heavy_runs:+r.heavy_runs||0,
      track_wins:+r.track_wins||0,track_places:+r.track_places||0,track_runs:+r.track_runs||0,
      dist_wins:+r.dist_wins||0,dist_places:+r.dist_places||0,dist_runs:+r.dist_runs||0,
      trk_dist_wins:+r.trk_dist_wins||0,trk_dist_places:+r.trk_dist_places||0,trk_dist_runs:+r.trk_dist_runs||0,
    };
    const days=parseInt(r.last_run_days)||0;
    const hasTrialWin=(r.sectionals||[]).some(s=>s.trial&&s.position===1);

    const mktSc=marketScore(r.win_odds,n);
    const formSc=recentFormScore(r.form);
    const classSc=classScore(r.fs_rating);
    const goingSc=scoreGoing(merged,rg,trend);
    const tTier=trainerTier(r.trainer);
    const jTier=jockeyTier(r.jockey);
    const stableCount=stableCounts[(r.trainer||"").toLowerCase()]||1;
    const tjSc=Math.min((tTier*0.6+jTier*0.4)*(stableCount>1?1-(stableCount-1)*0.08:1),1.0);
    const prepSc=prepCycleScore(r,days);
    const trkAffinRaw=scoreWPRN(merged.track_wins,merged.track_places,merged.track_runs);
    const trkDistSc=scoreWPRN(merged.trk_dist_wins,merged.trk_dist_places,merged.trk_dist_runs);
    const trackSc=merged.trk_dist_runs>0?Math.max(trkAffinRaw,trkDistSc):trkAffinRaw;
    const distSc=scoreWPRN(merged.dist_wins,merged.dist_places,merged.dist_runs);
    const sectSc=scoreSectionals(r.sectionals||[],raceGoing,r.weight,raceDistance||1200);
    const spellSc=spellScore(days,r.first_up,r.trainer,hasTrialWin);
    const placeSc=placeHistoryScore(merged.good_wins,merged.good_places,merged.good_runs,merged.soft_wins,merged.soft_places,merged.soft_runs,merged.heavy_wins,merged.heavy_places,merged.heavy_runs);
    const wtKnown=r.weight&&r.weight>0;
    const wtSc=(!wtKnown||maxW===minW)?0.5:Math.min(1-(r.weight-minW)/(maxW-minW),0.80);

    const scores={
      marketImplied:mktSc,recentForm:formSc,classSignal:classSc,goingPref:goingSc,
      trainerJockey:tjSc,prepCycle:prepSc,trackAffinity:trackSc,distancePref:distSc,
      sectionalScore:sectSc,spellFactor:spellSc,placeHistory:placeSc,weightHandicap:wtSc,
    };

    const tabMod=(tabSentiment(r.tab_comment)-0.5)*0.04;
    const convSignals=convergenceCheck(r,rg,trend,merged,formSc,mktSc,classSc);
    const convHits=convSignals.length;
    const convBonus=convHits>=4?0.045:convHits===3?0.030:convHits===2?0.015:0;

    // Absence penalty — non-elite stables only, dampened
    const absencePenalty=(days>120&&tTier<0.80&&!hasTrialWin)?0.015:days>200&&!hasTrialWin?0.010:0;

    // Class rise penalty — extreme cases only
    const fsVal=parseFloat(r.fs_rating)||0;
    const classRisePenalty=fsVal>=8?0.015:fsVal>=6?0.008:0;

    const rawTotal=Object.entries(W).reduce((s,[k,w])=>s+(scores[k]||0)*(w/WSUM),0)+convBonus+tabMod-absencePenalty-classRisePenalty;

    return{
      ...r,scores,rawTotal,
      _merged:merged,_sectionals:r.sectionals||[],
      _convSignals:convSignals,_convHits:convHits,_convBonus:convBonus,
      _absencePenalty:absencePenalty,_classRisePenalty:classRisePenalty,
      _tabScore:tabSentiment(r.tab_comment),_mktSc:mktSc,_spellSc:spellSc,_placeSc:placeSc,
    };
  });

  // ── SOFTMAX AMPLIFICATION ─────────────────────────────────────────────────
  // Apply softmax with temperature 0.55 to widen probability spread
  const rawTotals=scored.map(r=>r.rawTotal);
  const amplified=softmax(rawTotals,0.55);
  const withProb=scored.map((r,i)=>({...r,prob:amplified[i]})).sort((a,b)=>b.prob-a.prob);
  const spread=spreadQuality(withProb.map(r=>r.prob));
  return{runners:withProb,spread};
}

// ─── LABELS ────────────────────────────────────────────────────────────────
const LABELS={
  marketImplied:"MARKET ANCHOR",recentForm:"RECENT FORM",classSignal:"CLASS SIGNAL",
  goingPref:"GOING PREF",trainerJockey:"TRAINER/JOCKEY",prepCycle:"PREP CYCLE",
  trackAffinity:"TRACK AFFINITY",distancePref:"DISTANCE PREF",sectionalScore:"SECTIONALS",
  spellFactor:"SPELL/RESUMPTION",placeHistory:"PLACE HISTORY",weightHandicap:"WEIGHT",
};

// ─── APP ───────────────────────────────────────────────────────────────────
function App(){
  const [results,setResults]=useState(null);
  const [tab,setTab]=useState("load");
  const [json,setJson]=useState("");
  const [err,setErr]=useState("");
  const [race,setRace]=useState(null);

  function run(){
    setErr("");
    try{
      const parsed=JSON.parse(json);
      const data=parsed.runners?parsed:{runners:parsed};
      if(!Array.isArray(data.runners))throw new Error("No runners array found");
      const r=data.race||{};setRace(r);
      const res=analyze(data.runners,r.going||"",r.track||"",r.going_trend||"stable",r.distance||1200);
      setResults(res);setTab("results");
    }catch(e){setErr(e.message);}
  }

  const top=results?.runners?.[0];
  const spread=results?.spread;
  const rg=detectGoing(race?.going||"");
  const gw=goingWeights(rg,race?.going_trend||"stable");

  function formatSect(r){
    if(!r._sectionals||r._sectionals.length===0)return null;
    return r._sectionals.filter(s=>!s.trial).map(s=>{
      const n=normaliseSectional(s,race?.going||"",r.weight,race?.distance||1200);
      return`${s.last_600||"?"}s(${s.going||"?"}/${s.weight||"?"}kg)→${n?n.toFixed(2):"?"}adj`;
    }).join(" · ");
  }

  return(
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'Courier New',monospace",paddingBottom:60}}>
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:"14px 20px",display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:10,color:C.accent,letterSpacing:4,fontWeight:900}}>FORM</span>
        <span style={{fontSize:18,fontWeight:900,letterSpacing:-1}}>BOARD</span>
        <span style={{fontSize:9,color:C.muted,marginLeft:4}}>v19.2</span>
        <span style={{marginLeft:"auto",fontSize:8,color:C.muted,letterSpacing:1}}>SOFTMAX T0.40 · MARKET 25% · ELITE AVOID SUPPRESSION</span>
      </div>

      <div style={{maxWidth:820,margin:"0 auto",padding:"0 8px"}}>

        {race?.track&&(
          <div style={{margin:"12px 0 0",background:C.panel,border:`1px solid ${C.accentDim}`,borderLeft:`3px solid ${C.accent}`,padding:"8px 12px",fontSize:11,display:"flex",flexWrap:"wrap",gap:"4px 14px",alignItems:"center"}}>
            <span style={{color:C.accent,fontWeight:700}}>{race.track?.toUpperCase()}</span>
            <span style={{color:C.muted}}>{race.distance}m · {race.class}</span>
            <span style={{color:C.gold,fontWeight:700}}>{race.going}</span>
            {race.prize_money&&<span style={{color:C.muted}}>${(+race.prize_money).toLocaleString()}</span>}
            {spread&&<span style={{marginLeft:"auto",fontSize:8,color:spread==="strong"?C.accent:spread==="moderate"?C.gold:C.red,letterSpacing:1}}>SPREAD: {spread.toUpperCase()}</span>}
            <span style={{fontSize:8,color:C.muted,width:"100%"}}>
              GOOD <span style={{color:C.accent}}>{(gw.good*100).toFixed(0)}%</span> · SOFT <span style={{color:C.accent}}>{(gw.soft*100).toFixed(0)}%</span> · HEAVY <span style={{color:C.purple}}>{(gw.heavy*100).toFixed(0)}%</span>
              {race.going_trend&&race.going_trend!=="stable"&&<span style={{color:C.gold}}> · {race.going_trend.toUpperCase()}</span>}
            </span>
          </div>
        )}

        <div style={{display:"flex",marginTop:12,borderBottom:`1px solid ${C.border}`}}>
          {["load","results"].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{background:tab===t?C.panel:"transparent",color:tab===t?C.accent:C.muted,border:"none",borderBottom:tab===t?`2px solid ${C.accent}`:"2px solid transparent",padding:"7px 16px",fontFamily:"inherit",fontSize:10,letterSpacing:1.5,cursor:"pointer",textTransform:"uppercase"}}>
              {t==="load"?"LOAD RACE":"RESULTS"}
            </button>
          ))}
        </div>

        {tab==="load"&&(
          <div style={{marginTop:12}}>
            <div style={{fontSize:10,color:C.accent,letterSpacing:1.5,marginBottom:6}}>PASTE RACE JSON</div>
            <div style={{fontSize:9,color:C.muted,marginBottom:8,lineHeight:1.7,background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:"10px 12px"}}>
              v19.2: <span style={{color:C.gold}}>market anchor 25%</span> · <span style={{color:C.accent}}>softmax amplification</span> (spreads field meaningfully) · <span style={{color:C.blue}}>elite stable spell floor</span> (McEvoy/Maher/Waller resumers protected) · AVOID threshold −10%
            </div>
            <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,padding:"10px 12px",fontSize:9,color:C.muted,marginBottom:10,lineHeight:1.8}}>
              Sectionals use <span style={{color:C.accent}}>"last_600"</span> field (not "time"). Distance field required for going normalisation.
            </div>
            <textarea value={json} onChange={e=>setJson(e.target.value)}
              placeholder='{"race":{"track":"Ballarat","distance":1200,"class":"CL1","going":"Good (3)","going_trend":"stable","prize_money":27000},"runners":[...]}'
              style={{width:"100%",height:200,background:C.panel,border:`1px solid ${C.border}`,color:C.text,fontFamily:"inherit",fontSize:11,padding:10,resize:"vertical",outline:"none",borderRadius:4}}/>
            {err&&<div style={{color:C.red,fontSize:10,marginTop:4}}>⚠ {err}</div>}
            <button onClick={run} style={{marginTop:10,width:"100%",background:C.accent,color:"#000",border:"none",padding:"12px",fontFamily:"inherit",fontSize:11,fontWeight:700,letterSpacing:2,cursor:"pointer",borderRadius:3}}>LOAD AND RUN</button>
          </div>
        )}

        {tab==="results"&&results&&(
          <div style={{marginTop:12}}>

            {spread==="weak"&&(
              <div style={{background:"#1a0a0a",border:`1px solid ${C.red}`,borderRadius:4,padding:"8px 12px",marginBottom:10,fontSize:9,color:C.red,letterSpacing:1}}>
                ⚠ WEAK SPREAD — model cannot separate field. Reduce stakes or pass.
              </div>
            )}

            {top&&(
              <div style={{background:C.panel,border:`1px solid ${C.accent}`,borderRadius:4,padding:"12px 14px",marginBottom:14}}>
                <div style={{fontSize:9,color:C.accent,letterSpacing:3,marginBottom:4}}>TOP PICK</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                  <div>
                    <div style={{fontSize:16,fontWeight:900}}>{top.name} <span style={{fontSize:10,color:C.muted,fontWeight:400}}>(B{top.barrier})</span></div>
                    <div style={{fontSize:9,color:C.muted,marginTop:2}}>{top.trainer} · F:{top.form} · {top.weight?top.weight+"kg":"?kg"}</div>
                    {top._convHits>=2&&<div style={{fontSize:8,color:C.accent,marginTop:3}}>★ {top._convSignals.join(" · ")}</div>}
                    {top._sectionals?.length>0&&<div style={{fontSize:8,color:C.orange,marginTop:3}}>{formatSect(top)}</div>}
                    {top._placeSc>=0.70&&<div style={{fontSize:8,color:C.blue,marginTop:2}}>↑ strong place history</div>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:22,fontWeight:900,color:C.accent}}>{(top.prob*100).toFixed(1)}%</div>
                    <div style={{fontSize:10,color:C.muted}}>WIN ${top.win_odds}</div>
                  </div>
                </div>
                {edgeTag(top.prob,top.win_odds,trainerTier(top.trainer))&&(
                  <div style={{marginTop:8,fontSize:9,fontWeight:700,letterSpacing:2,color:edgeTag(top.prob,top.win_odds,trainerTier(top.trainer)).color,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
                    {edgeTag(top.prob,top.win_odds,trainerTier(top.trainer)).label} — {((top.prob-(1/(top.win_odds*1.17)))*100).toFixed(1)}% edge
                  </div>
                )}
              </div>
            )}

            <div style={{fontSize:8,color:C.muted,letterSpacing:1,marginBottom:4,display:"grid",gridTemplateColumns:"20px 1fr 44px 46px 46px 52px",gap:4,padding:"0 6px"}}>
              <span/><span>RUNNER</span><span style={{textAlign:"right"}}>PROB</span><span style={{textAlign:"right"}}>WIN</span><span style={{textAlign:"right"}}>PLC</span><span style={{textAlign:"right"}}>EDGE</span>
            </div>

            {results.runners.map((r,i)=>{
              const tag=edgeTag(r.prob,r.win_odds,trainerTier(r.trainer));
              const hasSect=r._sectionals?.some(s=>!s.trial&&s.last_600>0);
              const normedBest=hasSect?Math.min(...r._sectionals.filter(s=>!s.trial&&s.last_600>0).map(s=>normaliseSectional(s,race?.going||"",r.weight,race?.distance||1200)).filter(v=>v!==null)):null;
              return(
                <div key={r.name} style={{display:"grid",gridTemplateColumns:"20px 1fr 44px 46px 46px 52px",gap:4,padding:"9px 6px",background:i%2===0?C.panel:C.alt,borderBottom:`1px solid ${C.border}`,alignItems:"center",borderLeft:hasSect?`3px solid ${C.orange}`:`3px solid transparent`}}>
                  <span style={{fontSize:10,color:i===0?C.accent:C.muted,fontWeight:i===0?700:400}}>{i+1}</span>
                  <div>
                    <div style={{fontSize:11,fontWeight:i<3?700:400,color:i===0?C.text:"#a0b4c0"}}>{r.name}</div>
                    <div style={{fontSize:8,color:C.muted}}>{r.trainer?.split(" ").slice(-1)[0]} · F:{r.form} · {r.weight?r.weight+"kg":"?kg"}</div>
                    {hasSect&&normedBest&&<div style={{fontSize:8,color:C.orange}}>adj {normedBest.toFixed(2)}s best</div>}
                    {r._convHits>=2&&<div style={{fontSize:8,color:C.accent}}>★ {r._convHits} conv{r._convBonus>0?` +${(r._convBonus*100).toFixed(1)}%`:""}</div>}
                    {r._absencePenalty>0&&<div style={{fontSize:8,color:C.red}}>↓ absence −{(r._absencePenalty*100).toFixed(1)}%</div>}
                    {r._classRisePenalty>0&&<div style={{fontSize:8,color:C.red}}>↓ class rise −{(r._classRisePenalty*100).toFixed(1)}%</div>}
                    {r._tabScore>=0.65&&<div style={{fontSize:8,color:C.gold}}>TAB ✓</div>}
                    {r._tabScore<=0.35&&<div style={{fontSize:8,color:C.red}}>TAB ✗</div>}
                    {r._placeSc>=0.72&&<div style={{fontSize:8,color:C.blue}}>EW ↑</div>}
                  </div>
                  <span style={{textAlign:"right",fontSize:12,fontWeight:700,color:i===0?C.accent:C.text}}>{(r.prob*100).toFixed(1)}%</span>
                  <span style={{textAlign:"right",fontSize:11}}>{r.win_odds>0?`$${r.win_odds}`:"-"}</span>
                  <span style={{textAlign:"right",fontSize:11,color:C.muted}}>{r.place_odds?`$${r.place_odds}`:"-"}</span>
                  <span style={{textAlign:"right",fontSize:9,fontWeight:700,letterSpacing:1,color:tag?.color??C.muted}}>{tag?.label??"-"}</span>
                </div>
              );
            })}

            <div style={{marginTop:16,fontSize:9,color:C.muted,letterSpacing:1.5,marginBottom:8}}>SCORE BREAKDOWN — TOP 3</div>
            {results.runners.slice(0,3).map((r,i)=>(
              <div key={r.name} style={{background:C.panel,border:`1px solid ${i===0?C.accentDim:C.border}`,borderRadius:4,padding:"10px 14px",marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                  <span style={{fontSize:11,fontWeight:700,color:i===0?C.accent:C.text}}>{r.name}</span>
                  <span style={{fontSize:11,color:C.muted}}>{(r.prob*100).toFixed(1)}%</span>
                </div>
                {r._sectionals?.length>0&&<div style={{fontSize:8,color:C.orange,marginBottom:8,lineHeight:1.6}}>{formatSect(r)}</div>}
                {Object.entries(r.scores).map(([k,v])=>{
                  const pct=Math.min(v*100,100);
                  const col=pct>70?C.accent:pct>45?C.gold:C.red;
                  const lc=k==="marketImplied"?C.blue:k==="sectionalScore"?C.orange:k==="placeHistory"?C.blue:C.muted;
                  const wPct=((W[k]||0)/WSUM*100).toFixed(0);
                  return(
                    <div key={k} style={{marginBottom:5}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                        <span style={{fontSize:8,color:lc,letterSpacing:1}}>{LABELS[k]||k} <span style={{color:C.muted,fontSize:7}}>w:{wPct}%</span></span>
                        <span style={{fontSize:8,color:C.muted}}>{pct.toFixed(0)}</span>
                      </div>
                      <div style={{height:3,background:C.border,borderRadius:2}}>
                        <div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:2}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}

        <div style={{marginTop:14,padding:"8px 10px",background:C.panel,border:`1px solid ${C.border}`,borderRadius:4,fontSize:8,display:"flex",flexWrap:"wrap",gap:"3px 14px"}}>
          <span style={{color:"#00d4a0"}}>VALUE &gt;7%</span>
          <span style={{color:"#f0c040"}}>SLIGHT 2.5-7%</span>
          <span style={{color:"#4a6070"}}>FAIR</span>
          <span style={{color:"#ff4455"}}>AVOID &lt;−10%</span>
          <span style={{color:C.blue}}>● market</span>
          <span style={{color:C.accent}}>★ convergence</span>
          <span style={{color:C.orange}}>● sectionals</span>
          <span style={{color:C.blue}}>EW↑ place</span>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
